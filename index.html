<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control de Patio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79",
            measurementId: "G-J4MGT2J80C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');

        // --- LÓGICA DEL ESCÁNER QR ---
        let html5QrCode;

        window.encenderEscaner = function() {
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                document.getElementById('codigoUnico').value = decodedText;
                apagarEscaner();
                alert("Código QR detectado: " + decodedText);
            }).catch((err) => {
                console.error("Error al iniciar cámara", err);
            });
        };

        window.apagarEscaner = function() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                });
            }
        };

        // --- FUNCIONES DE CONTROL ---
        window.registrarIngreso = function() {
            const codigo = document.getElementById('codigoUnico').value;
            const placa = document.getElementById('placa').value;
            if(!codigo || !placa) return alert("Por favor, ingrese Código y Placa");

            push(vehiculosRef, {
                codigo,
                placa,
                estado: 'Ingreso a Planta',
                fechaIngreso: new Date().toLocaleString(),
                anden: 'Sin asignar',
                pesoInicial: 0,
                pesoFinal: 0,
                precintos: '',
                timestamp: Date.now()
            });
            document.getElementById('codigoUnico').value = '';
            document.getElementById('placa').value = '';
        };

        window.cambiarEstado = function(id, nuevoEstado) {
            const actualizaciones = { estado: nuevoEstado };
            if(nuevoEstado === 'En Carga') {
                const anden = prompt("Asigne un número de Andén:");
                if(!anden) return;
                actualizaciones.anden = anden;
                actualizaciones.inicioCarga = Date.now();
            }
            if(nuevoEstado === 'Pesaje Final') {
                const precintos = prompt("Ingrese los números de precintos:");
                if(!precintos) return;
                actualizaciones.precintos = precintos;
            }
            update(ref(db, `vehiculos/${id}`), actualizaciones);
        };

        window.registrarPeso = function(id, tipo) {
            const peso = prompt(`Ingrese el peso ${tipo} (kg):`);
            if(!peso) return;
            update(ref(db, `vehiculos/${id}`), { [tipo === 'inicial' ? 'pesoInicial' : 'pesoFinal']: peso });
        };

        window.darSalida = function(id) {
            if(confirm("¿Confirmar salida y cerrar proceso?")) remove(ref(db, `vehiculos/${id}`));
        };

        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaVehiculos');
            contenedor.innerHTML = '';
            if(!data) {
                contenedor.innerHTML = '<p class="text-center text-gray-400 mt-10 font-bold italic">Esperando ingresos...</p>';
                return;
            }

            Object.keys(data).forEach(id => {
                const v = data[id];
                let crono = "";
                if(v.estado === 'En Carga' && v.inicioCarga) {
                    const min = Math.floor((Date.now() - v.inicioCarga) / 60000);
                    crono = `<span class="bg-red-600 text-white px-2 py-1 rounded text-xs font-bold animate-pulse">${min} MIN EN CARGA</span>`;
                }

                contenedor.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 ${v.estado === 'En Carga' ? 'border-blue-600' : 'border-gray-200'} mb-4">
                        <div class="flex flex-col md:flex-row justify-between gap-4">
                            <div>
                                <h3 class="text-xl font-black text-blue-900">${v.placa} <span class="text-sm font-normal text-gray-400 italic">#${v.codigo}</span></h3>
                                <div class="mt-2 space-y-1 text-sm font-medium">
                                    <p>📍 <b>Estado:</b> <span class="text-orange-600 font-bold">${v.estado}</span></p>
                                    <p>🚚 <b>Andén:</b> ${v.anden}</p>
                                    <p>⚖️ <b>Peso:</b> ${v.pesoInicial}kg / ${v.pesoFinal}kg</p>
                                    ${v.precintos ? `<p>🔒 <b>Precintos:</b> ${v.precintos}</p>` : ''}
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2 items-center">
                                ${crono}
                                ${v.estado === 'Ingreso a Planta' ? `<button onclick="registrarPeso('${id}', 'inicial')" class="bg-slate-700 text-white text-[10px] px-3 py-2 rounded-lg font-bold">BÁSCULA IN</button>` : ''}
                                ${v.estado === 'Ingreso a Planta' ? `<button onclick="cambiarEstado('${id}', 'En Carga')" class="bg-blue-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold">INICIAR CARGA</button>` : ''}
                                ${v.estado === 'En Carga' ? `<button onclick="cambiarEstado('${id}', 'Pesaje Final')" class="bg-green-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold">FIN CARGA</button>` : ''}
                                ${v.estado === 'Pesaje Final' ? `<button onclick="registrarPeso('${id}', 'final')" class="bg-slate-700 text-white text-[10px] px-3 py-2 rounded-lg font-bold">BÁSCULA OUT</button>` : ''}
                                <button onclick="darSalida('${id}')" class="text-red-500 text-[10px] px-3 py-2 rounded-lg border border-red-100 hover:bg-red-50 font-bold uppercase">Salida</button>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</head>
<body class="bg-slate-100 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-lg mb-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center font-black uppercase italic tracking-tighter">
            <span>AGRIPAC Patio</span>
            <span class="text-[10px] bg-green-500 px-2 py-1 rounded-full animate-pulse">Online</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 px-4">
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest text-center">Registro de Garita</h2>
                
                <button onclick="encenderEscaner()" class="w-full mb-4 bg-slate-800 text-white py-3 rounded-2xl flex items-center justify-center gap-2 hover:bg-black transition-all">
                    <span class="text-xl">📷</span> <b>ESCANEAR CÓDIGO QR</b>
                </button>

                <div id="reader-container" class="hidden fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4">
                    <div id="reader" class="w-full max-w-sm bg-white rounded-2xl overflow-hidden"></div>
                    <button onclick="apagarEscaner()" class="mt-6 bg-red-600 text-white px-8 py-3 rounded-full font-bold">CANCELAR</button>
                </div>

                <div class="space-y-3">
                    <input id="codigoUnico" type="text" placeholder="Código Único" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none font-bold">
                    <input id="placa" type="text" placeholder="Placa Vehículo" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 outline-none font-bold uppercase">
                    <button onclick="registrarIngreso()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition-all">VALIDAR INGRESO</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div id="listaVehiculos"></div>
        </div>
    </main>
</body>
</html>
