<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Validación de Planificación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');

        // URL del CSV de tu Google Sheet
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let html5QrCode;

        // --- FUNCIÓN DE VALIDACIÓN CONTRA GOOGLE SHEETS ---
        async function validarEnPlanificacion(idEscaneado) {
            try {
                const response = await fetch(URL_SHEET_CSV);
                const data = await response.text();
                const filas = data.split("\n").map(row => row.split(","));
                
                // Buscar por ID (Columna A index 0)
                const encontrado = filas.find(f => f[0].trim().toUpperCase() === idEscaneado.trim().toUpperCase());

                if (encontrado) {
                    // Mapeo según tu captura: A:ID, C:PLACA(2), D:CHOFER(3), H:OPERADOR(7), I:AREA(8)
                    const datos = {
                        id: encontrado[0],
                        placa: encontrado[2],
                        chofer: encontrado[3],
                        operador: encontrado[7],
                        area: encontrado[8]
                    };
                    mostrarResultado(true, datos);
                } else {
                    mostrarResultado(false, null, idEscaneado);
                }
            } catch (error) {
                console.error("Error al leer planificación:", error);
                alert("Error de conexión con la planificación de Google Sheets");
            }
        }

        function mostrarResultado(autorizado, datos, idEscaneado) {
            const resDiv = document.getElementById('resultadoValidacion');
            resDiv.classList.remove('hidden');
            
            if(autorizado) {
                resDiv.innerHTML = `
                    <div class="bg-green-50 border-2 border-green-500 p-4 rounded-2xl animate-bounce">
                        <p class="text-green-700 font-black text-center text-lg">✅ AUTORIZADO</p>
                        <div class="text-[11px] mt-2 text-gray-700 space-y-1">
                            <p><b>PLACA:</b> ${datos.placa}</p>
                            <p><b>CHOFER:</b> ${datos.chofer}</p>
                            <p><b>AREA:</b> ${datos.area}</p>
                            <p><b>LOGISTICA:</b> ${datos.operador}</p>
                        </div>
                        <button onclick="confirmarIngreso('${datos.id}', '${datos.placa}', '${datos.area}')" class="w-full mt-4 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 shadow-lg">REGISTRAR INGRESO</button>
                    </div>`;
            } else {
                resDiv.innerHTML = `
                    <div class="bg-red-50 border-2 border-red-500 p-4 rounded-2xl text-center">
                        <p class="text-red-700 font-black text-lg">❌ NO AUTORIZADO</p>
                        <p class="text-xs text-red-600 mt-1 font-medium italic">El ID "${idEscaneado}" no está en la planificación de hoy.</p>
                        <button onclick="document.getElementById('resultadoValidacion').classList.add('hidden')" class="mt-3 text-xs font-bold text-gray-400 uppercase">Cerrar</button>
                    </div>`;
            }
        }

        window.confirmarIngreso = function(id, placa, area) {
            push(vehiculosRef, {
                codigo: id,
                placa: placa,
                area: area,
                estado: 'Ingreso a Planta',
                fechaIngreso: new Date().toLocaleString(),
                timestamp: Date.now()
            });
            document.getElementById('resultadoValidacion').classList.add('hidden');
            alert("Vehículo " + placa + " registrado exitosamente.");
        };

        // --- LÓGICA DEL ESCÁNER ---
        window.encenderEscaner = function() {
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                apagarEscaner();
                validarEnPlanificacion(text);
            });
        };

        window.apagarEscaner = function() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                });
            }
        };

        // MONITOR EN VIVO
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaVehiculos');
            contenedor.innerHTML = '';
            if(!data) return;
            Object.keys(data).forEach(key => {
                const v = data[key];
                contenedor.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600 mb-3 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-blue-900 leading-none">${v.placa}</p>
                        <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold">${v.area}</p>
                    </div>
                    <button onclick="darSalida('${key}')" class="text-[10px] font-bold text-red-400 border border-red-500/20 px-2 py-1 rounded-md hover:bg-red-500 hover:text-white transition-all">SALIDA</button>
                </div>`;
            });
        });

        window.darSalida = (key) => { if(confirm("¿Dar salida?")) remove(ref(db, `vehiculos/${key}`)); };
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="font-black italic tracking-tighter text-xl">AGRIPAC PATIO</h1>
        <div class="text-[10px] font-bold bg-blue-800 px-2 py-1 rounded">SISTEMA DE PLANIFICACIÓN</div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-50">
                <button onclick="encenderEscaner()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 hover:scale-105 transition-transform shadow-lg shadow-blue-200">
                    📷 ESCANEAR QR
                </button>
                <div id="resultadoValidacion" class="hidden mt-6"></div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Vehículos en Planta</h2>
            <div id="listaVehiculos"></div>
        </div>
    </main>

    <div id="reader-container" class="hidden fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4">
        <div id="reader" class="w-full max-w-sm bg-white rounded-3xl overflow-hidden shadow-2xl"></div>
        <button onclick="apagarEscaner()" class="mt-8 bg-red-600 text-white px-10 py-4 rounded-full font-black tracking-widest text-sm shadow-xl">CANCELAR</button>
    </div>
</body>
</html>
