<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control de Patio</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800;900&display=swap');
        
        :root {
            --agripac-blue: #003399;
            --agripac-gray-bg: #F4F7FA;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh; overflow: hidden;
        }

        /* Estilo para los Tabs Activos */
        .tab-active {
            border-bottom: 4px solid var(--agripac-blue);
            color: var(--agripac-blue) !important;
            font-weight: 700;
        }

        /* Ocultar elementos según permisos */
        .hidden-auth { display: none !important; }

        /* Estilo Sobrio para Modales en CSS3 */
        .modal-blur {
            background: rgba(0, 51, 153, 0.1);
            backdrop-filter: blur(8px);
            display: none; /* Oculto por defecto */
        }

        /* Animaciones */
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo específico para inputs tipo login (estilo ONE) */
        .login-input {
            border: 1px solid #D1D5DB;
            transition: all 0.2s ease;
        }
        .login-input:focus {
            border-color: #003399;
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.1);
        }

    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE (Tus credenciales reales)
        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79",
            measurementId: "G-J4MGT2J80C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let modalAction = null;

        // ==========================================
        // 1. BLOQUE: SEGURIDAD Y USUARIOS (PINS)
        // ==========================================
        const USERS = {
            "1111": ["secGarita", "secGaritaOut"], // Garita
            "2222": ["secBascula"],                // Báscula
            "3333": ["secDist"],                   // Distribución
            "4444": ["secCarga"],                  // Carga
            "0000": ["secGarita", "secBascula", "secDist", "secCarga", "secGaritaOut"] // Admin
        };

        // Verificación de Sesión al cargar
        window.onload = () => {
            const sessionPin = localStorage.getItem('agripac_session');
            if (sessionPin && USERS[sessionPin]) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                configurarMenu(sessionPin);
            }
        };

        window.login = () => {
            const pin = document.getElementById('loginPassword').value; // Usamos el campo de password
            if(USERS[pin]) {
                localStorage.setItem('agripac_session', pin);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                configurarMenu(pin);
            } else {
                alert("PIN O CONTRASEÑA INCORRECTA");
            }
        };

        function configurarMenu(pin) {
            const accesos = USERS[pin];
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(!accesos.includes(btn.dataset.sec)) btn.classList.add('hidden-auth');
            });
            // Mostrar la primera sección permitida
            mostrarSeccion(accesos[0], document.querySelector(`[data-sec="${accesos[0]}"]`));
        }

        window.logout = () => {
            localStorage.removeItem('agripac_session');
            location.reload();
        };

        // ==========================================
        // 2. BLOQUE: NAVEGACIÓN Y MODALES (REPETIDOS DE V2)
        // ==========================================
        window.mostrarSeccion = (id, el) => {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
        };

        window.abrirModal = (titulo, etiqueta, callback) => {
            document.getElementById('mTitle').innerText = titulo;
            document.getElementById('mLabel').innerText = etiqueta;
            document.getElementById('mInput').value = '';
            document.getElementById('modalCont').style.display = 'flex';
            modalAction = callback;
        };

        window.cerrarModal = () => document.getElementById('modalCont').style.display = 'none';

        window.confirmarModal = () => {
            const val = document.getElementById('mInput').value;
            if(!val) return;
            modalAction(val);
            cerrarModal();
        };

        // ==========================================
        // 3. BLOQUE: LÓGICA DE PROCESOS
        // ==========================================
        window.registrarIngreso = async (idManual = null) => {
            const id = idManual || document.getElementById('inputGarita').value;
            if(!id) return;
            try {
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const filas = csv.split("\n").map(r => r.split(","));
                const f = filas.find(row => row[0].trim().toUpperCase() === id.trim().toUpperCase());
                if(f) {
                    push(vehiculosRef, {
                        codigo: f[0].trim(), placa: f[2].trim(), chofer: f[3].trim(), area: f[8].trim(),
                        estado: 'PESAJE_ENTRADA', fecha: new Date().toLocaleString(), anden: '-', pEntrada:0, pSalida:0, precintos: '-'
                    });
                    document.getElementById('inputGarita').value = '';
                } else { alert("ID NO ENCONTRADO EN PLANIFICACIÓN"); }
            } catch (e) { alert("ERROR DE CONEXIÓN"); }
        };

        window.actualizar = (id, data) => update(ref(db, `vehiculos/${id}`), data);
        window.borrar = (id) => { if(confirm("¿CONFIRMAR SALIDA FÍSICA?")) remove(ref(db, `vehiculos/${id}`)); };

        // ==========================================
        // 4. BLOQUE: RENDERIZADO (MONITOR)
        // ==========================================
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const L = { B: document.getElementById('lBascula'), D: document.getElementById('lDist'), C: document.getElementById('lCarga'), G: document.getElementById('lGaritaOut') };
            Object.values(L).forEach(c => c.innerHTML = '');
            if(!data) return;

            Object.keys(data).forEach(key => {
                const v = data[key];
                const card = (btn) => `
                    <div class="bg-white border border-slate-200 rounded-xl p-5 mb-4 shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-slate-300 tracking-widest uppercase italic">${v.estado.replace(/_/g,' ')}</span>
                            <span class="text-[10px] font-bold text-blue-900 bg-blue-50 px-2 py-0.5 rounded uppercase">ID: ${v.codigo}</span>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tighter mb-1 italic">${v.placa}</h3>
                        <p class="text-[11px] font-bold text-slate-500 uppercase mb-4">${v.chofer} | ${v.area}</p>
                        ${v.anden !== '-' ? `<p class="text-xs font-black text-blue-800 mb-4 tracking-widest uppercase">📍 ANDÉN: ${v.anden}</p>` : ''}
                        ${btn}
                    </div>`;

                if(v.estado === 'PESAJE_ENTRADA') L.B.innerHTML += card(`<button onclick="abrirModal('BÁSCULA','PESO ENTRADA (KG)', (val)=>actualizar('${key}',{pEntrada:val, estado:'DIST_DOCS_CARGA'}))" class="w-full bg-[#003399] text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest">Registrar Pesaje</button>`);
                else if(v.estado === 'DIST_DOCS_CARGA') L.D.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'CARGA_ASIGNAR_ANDEN'})" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold text-xs uppercase">Entregar Docs Carga</button>`);
                else if(v.estado === 'CARGA_ASIGNAR_ANDEN') L.C.innerHTML += card(`<button onclick="abrirModal('CARGA','NÚMERO DE ANDÉN', (val)=>actualizar('${key}',{anden:val, estado:'CARGA_LISTO_INICIO'}))" class="w-full bg-slate-700 text-white py-3 rounded-lg font-bold text-xs uppercase">Asignar Andén</button>`);
                else if(v.estado === 'CARGA_LISTO_INICIO') L.C.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'CARGANDO', inicioCarga: Date.now()})" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-xs uppercase">Iniciar Carga</button>`);
                else if(v.estado === 'CARGANDO') {
                    const m = Math.floor((Date.now() - v.inicioCarga)/60000);
                    L.C.innerHTML += card(`<div class="flex gap-2"><div class="flex-1 bg-red-50 text-red-600 font-bold text-xs flex items-center justify-center rounded-lg animate-pulse">${m} MIN</div><button onclick="abrirModal('CARGA','NÚMERO PRECINTOS', (val)=>actualizar('${key}',{precintos:val, estado:'DIST_DOCS_SALIDA'}))" class="flex-[2] bg-green-600 text-white py-3 rounded-lg font-bold text-xs uppercase">Finalizar Carga</button></div>`);
                }
                else if(v.estado === 'DIST_DOCS_SALIDA') L.D.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'PESAJE_SALIDA'})" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-xs uppercase">Entregar Docs Salida</button>`);
                else if(v.estado === 'PESAJE_SALIDA') L.B.innerHTML += card(`<button onclick="abrirModal('BÁSCULA','PESO SALIDA (KG)', (val)=>actualizar('${key}',{pSalida:val, estado:'LISTO_SALIDA'}))" class="w-full bg-[#003399] text-white py-3 rounded-lg font-bold text-xs uppercase">Registrar Pesaje Final</button>`);
                else if(v.estado === 'LISTO_SALIDA') L.G.innerHTML += card(`<button onclick="borrar('${key}')" class="w-full bg-black text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest shadow-xl hover:bg-slate-800 transition-all">Confirmar Salida Física</button>`);
            });
        });

        window.scanner = () => {
            const h = new Html5Qrcode("qr-reader");
            document.getElementById('qr-modal').style.display = 'flex';
            h.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ h.stop(); document.getElementById('qr-modal').style.display='none'; registrarIngreso(t); });
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-700">

    <div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center">
        
        <div class="absolute inset-0 z-0">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSq_4295Q0_tW1vA1FqU7S8GqH-zO4-i5Xv2w&s" 
                 alt="Fondo Agripac" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-blue-950/40"></div>
        </div>

        <div class="relative z-10 w-full h-full flex items-center p-8 lg:p-20">
            
            <div class="w-full lg:w-1/2 text-white pr-20 hidden lg:block">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-16 mb-8 bg-white p-2 rounded-lg">
                <h1 class="text-6xl font-black tracking-tighter mb-4 leading-tight">Su aliado <span class="text-[#FFB800]">NÚMERO UNO</span> en control de patio.</h1>
                <p class="text-xl text-blue-50">Simplifique la logística de sus despachos con Agripac Patio.</p>
            </div>

            <div class="w-full lg:w-1/2 flex justify-center lg:justify-end">
                <div class="bg-white p-12 rounded-3xl shadow-2xl w-full max-w-lg animate-fade border border-slate-100">
                    
                    <div class="flex justify-between items-center mb-10">
                        <h2 class="text-4xl font-black text-slate-900 tracking-tighter italic">Login</h2>
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-10 lg:hidden">
                    </div>

                    <div class="space-y-6">
                        <div class="relative">
                            <input type="text" id="loginUser" placeholder="User ID" 
                                   class="login-input w-full p-5 rounded-xl bg-slate-50 text-slate-800 outline-none text-lg">
                        </div>

                        <div class="relative">
                            <input type="password" id="loginPassword" placeholder="PIN de Acceso" 
                                   class="login-input w-full p-5 rounded-xl bg-slate-50 text-slate-800 outline-none text-lg tracking-widest font-black">
                        </div>

                        <div class="text-right">
                            <a href="#" class="text-xs text-slate-400 hover:text-[#003399]">¿Olvidó su contraseña?</a>
                        </div>

                        <button onclick="login()" class="w-full bg-[#003399] text-white py-5 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-200 hover:bg-blue-800 active:scale-95 transition-all mt-4">
                            Sign In
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        
        <header class="bg-white border-b py-6 px-4 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-8">
                <h1 class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-400 italic">Patio Flow</h1>
            </div>
            <button onclick="logout()" class="text-[8px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-3 py-2 rounded-lg hover:bg-red-100 transition-colors">Cerrar Sesión</button>
        </header>

        <nav class="sticky top-[81px] z-30 bg-white border-b flex overflow-x-auto no-scrollbar">
            <button data-sec="secGarita" onclick="mostrarSeccion('secGarita', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (In)</button>
            <button data-sec="secBascula" onclick="mostrarSeccion('secBascula', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Báscula</button>
            <button data-sec="secDist" onclick="mostrarSeccion('secDist', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Distribución</button>
            <button data-sec="secCarga" onclick="mostrarSeccion('secCarga', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Carga</button>
            <button data-sec="secGaritaOut" onclick="mostrarSeccion('secGaritaOut', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (Out)</button>
        </nav>

        <main class="max-w-xl mx-auto p-6 pb-24">
            
            <div id="secGarita" class="seccion-app animate-fade">
                <div class="bg-white border border-slate-200 rounded-xl p-8 shadow-sm text-center">
                    <button onclick="scanner()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black mb-6 text-[10px] uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-800 transition-all">📷 ESCANEAR QR</button>
                    <div class="relative mb-6 text-center"><hr class="border-slate-100"><span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-[8px] text-slate-300 font-bold uppercase tracking-widest">Ingreso Manual</span></div>
                    <input id="inputGarita" type="text" placeholder="ID PLANIFICACIÓN" class="w-full p-4 bg-slate-50 border border-slate-200 rounded mb-4 text-center font-bold text-slate-800 focus:border-[#003399] outline-none uppercase transition-all shadow-inner">
                    <button onclick="registrarIngreso()" class="w-full border-2 border-[#003399] text-[#003399] py-4 rounded-2xl font-black uppercase text-[9px] tracking-widest hover:bg-blue-50 transition-all">Validar Planificación</button>
                </div>
            </div>

            <div id="secBascula" class="seccion-app hidden animate-fade"><div id="lBascula"></div></div>
            <div id="secDist" class="seccion-app hidden animate-fade"><div id="lDist"></div></div>
            <div id="secCarga" class="seccion-app hidden animate-fade"><div id="lCarga"></div></div>
            <div id="secGaritaOut" class="seccion-app hidden animate-fade"><div id="lGaritaOut"></div></div>
        </main>
    </div>

    <div id="modalCont" class="fixed inset-0 modal-blur z-[300] items-center justify-center p-6 animate-fade">
        <div class="bg-white w-full max-w-sm rounded-lg p-8 border-t-4 border-[#003399] shadow-2xl">
            <h2 id="mTitle" class="text-center font-bold text-slate-800 text-lg uppercase mb-1">TÍTULO</h2>
            <p id="mLabel" class="text-center text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-6 italic">Instrucción</p>
            <input id="mInput" type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded mb-8 text-center font-bold text-slate-800 focus:border-[#003399] outline-none uppercase transition-all">
            <div class="flex gap-4">
                <button onclick="cerrarModal()" class="flex-1 text-[9px] font-bold uppercase text-slate-400 tracking-widest">Cancelar</button>
                <button onclick="confirmarModal()" class="flex-1 bg-[#003399] text-white py-3 rounded font-bold text-[9px] uppercase tracking-widest active:scale-95">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-white z-[400] flex flex-col items-center justify-center p-6 hidden">
        <div id="qr-reader" class="w-full max-w-sm border-2 border-[#003399] rounded-lg overflow-hidden mb-8 shadow-xl"></div>
        <button onclick="location.reload()" class="text-[9px] font-bold uppercase text-slate-400 tracking-widest bg-slate-100 px-6 py-2 rounded-full">Finalizar Cámara</button>
    </div>

</body>
</html>
