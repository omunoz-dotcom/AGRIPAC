<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN OFICIAL
        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');

        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let html5QrCode;

        // VALIDACIÓN
        window.validarEntrada = async function(idEscaneado = null) {
            const idABuscar = idEscaneado || document.getElementById('inputManual').value;
            if (!idABuscar) return alert("Ingrese un código");

            const resDiv = document.getElementById('resultadoValidacion');
            resDiv.innerHTML = "<p class='text-center p-4 font-bold text-blue-500 animate-pulse'>Consultando Planificación...</p>";
            resDiv.classList.remove('hidden');

            try {
                const response = await fetch(URL_SHEET_CSV);
                const data = await response.text();
                const filas = data.split("\n").map(row => row.split(","));
                
                // Limpiamos espacios y pasamos a Mayúsculas para evitar errores de tipeo
                const encontrado = filas.find(f => f[0].trim().toUpperCase() === idABuscar.trim().toUpperCase());

                if (encontrado) {
                    const datos = {
                        id: encontrado[0].trim(),
                        placa: encontrado[2].trim(),
                        chofer: encontrado[3].trim(),
                        area: encontrado[8].trim()
                    };
                    
                    resDiv.innerHTML = `
                        <div class="bg-green-50 border-2 border-green-500 p-5 rounded-2xl shadow-xl">
                            <p class="text-green-700 font-black text-center text-xl mb-3">✅ AUTORIZADO</p>
                            <div class="space-y-1 bg-white p-3 rounded-xl border border-green-100 text-sm">
                                <p><b>PLACA:</b> ${datos.placa}</p>
                                <p><b>CHOFER:</b> ${datos.chofer}</p>
                                <p><b>AREA:</b> ${datos.area}</p>
                            </div>
                            <button id="btnFinal" class="w-full mt-4 bg-green-600 text-white py-4 rounded-xl font-black shadow-lg active:scale-95 transition-all">
                                CONFIRMAR INGRESO 🚛
                            </button>
                        </div>`;
                    
                    // Asignamos el evento click manualmente para asegurar que funcione
                    document.getElementById('btnFinal').onclick = () => {
                        confirmarIngreso(datos.id, datos.placa, datos.area);
                    };

                } else {
                    resDiv.innerHTML = `
                        <div class="bg-red-50 border-2 border-red-500 p-5 rounded-2xl text-center shadow-lg">
                            <p class="text-red-700 font-black text-xl">❌ NO AUTORIZADO</p>
                            <p class="text-sm text-red-600 mt-2 italic font-medium">ID "${idABuscar}" no encontrado.</p>
                            <button onclick="document.getElementById('resultadoValidacion').classList.add('hidden')" class="mt-4 text-xs font-bold text-gray-400">CERRAR</button>
                        </div>`;
                }
            } catch (e) {
                alert("Error de conexión con Sheets. Verifique internet.");
            }
        };

        // GUARDAR EN FIREBASE
        function confirmarIngreso(id, placa, area) {
            try {
                push(vehiculosRef, {
                    codigo: id,
                    placa: placa,
                    area: area,
                    estado: 'Ingreso a Planta',
                    fechaIngreso: new Date().toLocaleString(),
                    timestamp: Date.now()
                }).then(() => {
                    document.getElementById('resultadoValidacion').classList.add('hidden');
                    document.getElementById('inputManual').value = '';
                    alert("¡Registro Exitoso! El vehículo " + placa + " ya está en monitor.");
                });
            } catch (error) {
                alert("Error al guardar en la base de datos.");
            }
        }

        // SALIDA
        window.darSalida = (key) => {
            if(confirm("¿Confirmar salida?")) remove(ref(db, `vehiculos/${key}`));
        };

        // ESCÁNER
        window.encenderEscaner = function() {
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                apagarEscaner();
                validarEntrada(text);
            });
        };

        window.apagarEscaner = function() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => { document.getElementById('reader-container').classList.add('hidden'); });
            }
        };

        // MONITOR
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaVehiculos');
            contenedor.innerHTML = '';
            if(!data) return;
            Object.keys(data).forEach(key => {
                const v = data[key];
                contenedor.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-md border-l-8 border-blue-700 mb-3 flex justify-between items-center animate-fadeIn">
                    <div>
                        <p class="font-black text-blue-900 text-lg leading-tight uppercase">${v.placa}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter italic">${v.area}</p>
                    </div>
                    <button onclick="darSalida('${key}')" class="bg-red-50 text-red-600 text-[10px] font-black px-3 py-2 rounded-lg border border-red-200">SALIDA</button>
                </div>`;
            });
        });
    </script>
</head>
<body class="bg-slate-100 font-sans">
    <nav class="bg-blue-900 text-white p-5 text-center font-black italic shadow-xl text-xl uppercase tracking-tighter">AGRIPAC PATIO</nav>
    <main class="max-w-4xl mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-8 mt-4">
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-2xl border border-blue-50">
                <button onclick="encenderEscaner()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-all mb-6">
                    <span class="text-xl">📷</span> ESCANEAR QR
                </button>
                <div class="space-y-3">
                    <input id="inputManual" type="text" placeholder="INGRESO MANUAL" class="w-full p-4 bg-slate-50 border-2 border-blue-100 rounded-2xl outline-none font-black text-center text-blue-900 uppercase focus:border-blue-500">
                    <button onclick="validarEntrada()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-md hover:bg-blue-700 active:scale-95 transition-all text-xs tracking-widest">VALIDAR ID</button>
                </div>
                <div id="resultadoValidacion" class="hidden mt-6"></div>
            </div>
        </div>
        <div class="md:col-span-2">
            <h2 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest text-center md:text-left">Vehículos en Planta</h2>
            <div id="listaVehiculos" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
        </div>
    </main>
    <div id="reader-container" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-2 rounded-[2rem] overflow-hidden shadow-2xl"><div id="reader"></div></div>
        <button onclick="apagarEscaner()" class="mt-8 text-white border border-white/30 px-10 py-3 rounded-full font-bold text-xs uppercase tracking-widest bg-red-600">CANCELAR</button>
    </div>
</body>
</html>
