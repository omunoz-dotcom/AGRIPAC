<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Gestión de Patio v5.2</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800&display=swap');
        :root { --agripac-blue: #003399; --bg-gray: #F4F7FA; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-gray); margin: 0; overflow: hidden; }
        .tab-active { border-bottom: 4px solid var(--agripac-blue); color: var(--agripac-blue) !important; font-weight: 800; }
        .modal-overlay { background: rgba(0, 51, 153, 0.2); backdrop-filter: blur(5px); display: none; }
        .hidden-auth { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const historialRef = ref(db, 'historial');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        // --- FUNCIÓN DE AUDITORÍA ---
        const registrarLog = async (codigo, accion) => {
            const session = JSON.parse(localStorage.getItem('agripac_session'));
            const ahora = new Date();
            await push(historialRef, {
                codigo: codigo,
                accion: accion,
                fecha: ahora.toLocaleDateString(),
                hora: ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                usuario: session ? session.email : "Sistema",
                timestamp: ahora.toISOString()
            });
        };

        // --- AUTH ---
        window.login = async () => {
            const emailInput = document.getElementById('loginUser').value.trim().toLowerCase();
            const passInput = document.getElementById('loginPassword').value.trim();
            const btn = document.querySelector('button[onclick="login()"]');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                const snapshot = await get(child(ref(db), 'usuarios'));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    let encontrado = null;
                    Object.keys(data).forEach(key => {
                        if (data[key].email.toLowerCase() === emailInput && data[key].pass === passInput) { encontrado = data[key]; }
                    });
                    if (encontrado) {
                        localStorage.setItem('agripac_session', JSON.stringify(encontrado));
                        location.reload();
                    } else { alert("Error de credenciales"); btn.innerText="ACCEDER"; btn.disabled=false; }
                }
            } catch (e) { alert(e.message); btn.disabled=false; }
        };

        window.logout = () => { localStorage.removeItem('agripac_session'); location.reload(); };

        window.mostrarSeccion = (id, el) => {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
        };

        // --- DASHBOARD ---
        const moduloDashboard = {
            init: async function() {
                const hoy = new Date().toLocaleDateString();
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const filasPlan = csv.split("\n").map(r => r.split(",")).slice(1).filter(f => f[5] && f[5].trim() === hoy);

                onValue(ref(db), (snapshot) => {
                    const base = snapshot.val() || {};
                    const activos = base.vehiculos || {};
                    const historial = base.historial || {};
                    const cont = document.getElementById('lDashboard');
                    let counts = { programadas: filasPlan.length, pendientes: 0, enPlanta: 0, despachadas: 0 };

                    const htmlLista = filasPlan.map(f => {
                        const idPlan = f[0].trim().toUpperCase();
                        const vReal = Object.values(activos).find(v => v.codigo.toUpperCase() === idPlan);
                        // Para el estatus "Despachado", verificamos si existe alguna acción final en historial
                        const vHist = Object.values(historial).find(h => h.codigo.toUpperCase() === idPlan && h.accion === "Salida Confirmada");
                        
                        let statusDesc = "PENDIENTE", statusColor = "text-slate-400", bgStatus = "bg-slate-50";

                        if (vReal) {
                            counts.enPlanta++;
                            statusDesc = vReal.estado.replace(/_/g,' ');
                            statusColor = "text-blue-800 font-bold";
                            bgStatus = "bg-blue-100 border border-blue-200";
                        } else if (vHist) {
                            counts.despachadas++;
                            statusDesc = "DESPACHADO";
                            statusColor = "text-green-700 font-bold";
                            bgStatus = "bg-green-100 border border-green-200";
                        } else { counts.pendientes++; }

                        return `<tr class="border-b border-slate-100"><td class="p-4 text-[10px] font-bold text-slate-700 underline uppercase">${f[1]}</td><td class="p-4 text-[10px] text-slate-600 uppercase">${f[3]}</td><td class="p-4 text-[10px] text-slate-800 font-black uppercase">${f[2]}</td><td class="p-4 text-[10px] text-slate-500 uppercase">${f[7] || 'N/A'}</td><td class="p-4 text-right"><span class="px-3 py-1 rounded-lg text-[8px] font-black uppercase ${bgStatus} ${statusColor}">${statusDesc}</span></td></tr>`;
                    }).join('');

                    document.getElementById('countProg').innerText = counts.programadas;
                    document.getElementById('countPend').innerText = counts.pendientes;
                    document.getElementById('countPlanta').innerText = counts.enPlanta;
                    document.getElementById('countCarga').innerText = counts.despachadas;
                    cont.innerHTML = `<table class="w-full text-left"><thead><tr class="bg-slate-50 text-[9px] uppercase text-slate-500 font-black border-b"><th class="p-4">Ruta</th><th class="p-4">Chofer</th><th class="p-4">Placa</th><th class="p-4">Operador</th><th class="p-4 text-right">Estatus</th></tr></thead><tbody>${htmlLista}</tbody></table>`;
                });
            }
        };

        // --- PROCESOS CON LOG ---
        window.procUpdate = async (id, data) => {
            const vRef = ref(db, `vehiculos/${id}`);
            const snap = await get(vRef);
            if(snap.exists()) await registrarLog(snap.val().codigo, data.estado.replace(/_/g,' '));
            update(vRef, data).catch(e => alert(e.message));
        };
        
        window.procDelete = async (id) => {
            if(!confirm("¿CONFIRMAR SALIDA?")) return;
            const vRef = ref(db, `vehiculos/${id}`);
            const snap = await get(vRef);
            if (snap.exists()) {
                await registrarLog(snap.val().codigo, "Salida Confirmada");
                remove(vRef);
            }
        };

        window.registrarIngreso = async (idManual = null) => {
            const id = idManual || document.getElementById('inputGarita').value.trim().toUpperCase();
            if(!id) return;
            try {
                const snapAct = await get(vehiculosRef);
                if (snapAct.exists() && Object.values(snapAct.val()).some(v => v.codigo.toUpperCase() === id)) { alert("YA EN PATIO"); return; }
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const f = csv.split("\n").map(r => r.split(",")).find(row => row[0].trim().toUpperCase() === id);
                if(f) {
                    await push(vehiculosRef, { codigo: f[0].trim(), placa: f[2].trim(), chofer: f[3].trim(), area: f[8].trim(), estado: 'Ingreso Garita', fechaIngreso: new Date().toLocaleString() });
                    await registrarLog(f[0].trim(), "Ingreso Garita");
                    document.getElementById('inputGarita').value = '';
                } else alert("NO PLANIFICADO");
            } catch (e) { alert("Error"); }
        };

        window.descargarReporte = async () => {
            const snap = await get(historialRef);
            if (!snap.exists()) return alert("Sin datos");
            const data = snap.val();
            let csvContent = "data:text/csv;charset=utf-8,ID UNICO,Accion,Fecha,Hora,Usuario\n";
            Object.values(data).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp)).forEach(v => {
                csvContent += `${v.codigo},${v.accion},${v.fecha},${v.hora},${v.usuario}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Auditoria_Movimientos.csv`);
            document.body.appendChild(link);
            link.click();
        };

        // --- MONITOR ---
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const L = { 'secBascula': document.getElementById('lBascula'), 'secDist': document.getElementById('lDist'), 'secCarga': document.getElementById('lCarga'), 'secGaritaOut': document.getElementById('lGaritaOut') };
            let counts = { bascula: 0, dist: 0, carga: 0, out: 0 };
            Object.values(L).forEach(s => s.innerHTML = '');
            if (data) {
                Object.keys(data).forEach(key => {
                    const v = data[key];
                    const est = v.estado;
                    if (est.includes('PESAJE') || est.includes('Báscula') || est.includes('BÁSCULA') || est === 'Ingreso Garita') counts.bascula++;
                    if (est.includes('DIST')) counts.dist++;
                    if (est.includes('CARGA')) counts.carga++;
                    if (est === 'LISTO_SALIDA') counts.out++;

                    const card = (btn) => `<div class="bg-white border rounded-2xl p-6 mb-4 shadow-sm animate-fade"><span class="text-[9px] font-black text-slate-300 uppercase italic">${est}</span><h3 class="text-2xl font-black text-slate-800 italic">${v.placa}</h3><p class="text-[10px] text-slate-500 font-bold uppercase mb-4">${v.chofer}</p>${btn}</div>`;

                    if(est === 'Ingreso Garita' || est === 'PESAJE_ENTRADA') L.secBascula.innerHTML += card(`<button onclick="window.abrirModal('BÁSCULA','PESO ENTRADA', (val)=>window.procUpdate('${key}',{pEntrada:val, estado:'Peso entrada báscula'}))" class="w-full bg-[#003399] text-white py-4 rounded-xl font-black text-[10px] uppercase">Registrar Peso</button>`);
                    else if(est === 'Peso entrada báscula') L.secDist.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'Distribución Docs Carga'})" class="w-full bg-slate-700 text-white py-4 rounded-xl font-black text-[10px] uppercase">Docs Carga</button>`);
                    else if(est === 'Distribución Docs Carga') L.secCarga.innerHTML += card(`<button onclick="window.abrirModal('CARGA','NÚMERO ANDÉN', (val)=>window.procUpdate('${key}',{anden:val, estado:'Carga Asignar Andén'}))" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black text-[10px] uppercase">Asignar Andén</button>`);
                    else if(est === 'Carga Asignar Andén') L.secCarga.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'Iniciando Carga'})" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Iniciar Carga</button>`);
                    else if(est === 'Iniciando Carga') L.secCarga.innerHTML += card(`<button onclick="window.abrirModal('CARGA','PRECINTOS', (val)=>window.procUpdate('${key}',{precintos:val, estado:'Distribución Docs Salida'}))" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Finalizar Carga</button>`);
                    else if(est === 'Distribución Docs Salida') L.secDist.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'Peso salida báscula'})" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Docs Salida</button>`);
                    else if(est === 'Peso salida báscula') L.secBascula.innerHTML += card(`<button onclick="window.abrirModal('BÁSCULA','PESO SALIDA', (val)=>window.procUpdate('${key}',{pSalida:val, estado:'LISTO_SALIDA'}))" class="w-full bg-[#003399] text-white py-4 rounded-xl font-black text-[10px] uppercase">Peso Salida</button>`);
                    else if(est === 'LISTO_SALIDA') L.secGaritaOut.innerHTML += card(`<button onclick="window.procDelete('${key}')" class="w-full bg-black text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-2xl">Confirmar Salida</button>`);
                });
            }
            document.getElementById('badgeBascula').innerText = counts.bascula; document.getElementById('badgeDist').innerText = counts.dist; document.getElementById('badgeCarga').innerText = counts.carga; document.getElementById('badgeOut').innerText = counts.out;
        });

        window.abrirModal = (titulo, etiqueta, callback) => { document.getElementById('mTitle').innerText = titulo; document.getElementById('mLabel').innerText = etiqueta; document.getElementById('mInput').value = ''; document.getElementById('mainModal').style.display = 'flex'; window.modalAction = callback; };
        window.cerrarModal = () => document.getElementById('mainModal').style.display = 'none';
        window.confirmarModal = () => { const val = document.getElementById('mInput').value; if(!val) return; window.modalAction(val); cerrarModal(); };

        window.onload = () => {
            const session = localStorage.getItem('agripac_session');
            if (session) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const roles = JSON.parse(session).roles || [];
                document.querySelectorAll('.tab-btn').forEach(b => { if(!roles.includes(b.dataset.sec)) b.classList.add('hidden-auth'); });
                const visible = document.querySelector('.tab-btn:not(.hidden-auth)');
                if (visible) { mostrarSeccion(visible.dataset.sec, visible); if(roles.includes("secDashboard")) moduloDashboard.init(); }
            }
        };

        window.uiScanner = () => { const h = new Html5Qrcode("reader"); document.getElementById('rc').classList.remove('hidden'); h.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ h.stop(); document.getElementById('rc').classList.add('hidden'); registrarIngreso(t); }); };
    </script>
</head>
<body>
    <div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center bg-blue-900">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md animate-fade">
            <h2 class="text-4xl font-black text-slate-900 mb-8 italic italic tracking-tighter">Sign In</h2>
            <input type="email" id="loginUser" placeholder="usuario@agripac.com.ec" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 font-bold outline-none focus:border-blue-900">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-2xl mb-6 font-bold outline-none focus:border-blue-900">
            <button onclick="login()" class="w-full bg-[#003399] text-white py-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Acceder al Patio</button>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col">
        <header class="bg-white border-b py-4 px-8 flex justify-between items-center sticky top-0 z-40">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-8">
            <button onclick="logout()" class="text-[9px] font-black uppercase text-red-500 bg-red-50 px-4 py-2 rounded-xl">Cerrar Sesión</button>
        </header>

        <nav class="bg-white border-b flex overflow-x-auto no-scrollbar sticky top-[65px] z-30">
            <button data-sec="secDashboard" onclick="mostrarSeccion('secDashboard', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Dashboard</button>
            <button data-sec="secGarita" onclick="mostrarSeccion('secGarita', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Garita (In) <span id="badgeGarita" class="ml-1 bg-slate-100 px-2 rounded-full text-[9px]">0</span></button>
            <button data-sec="secBascula" onclick="mostrarSeccion('secBascula', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Báscula <span id="badgeBascula" class="ml-1 bg-blue-100 text-blue-700 px-2 rounded-full text-[9px]">0</span></button>
            <button data-sec="secDist" onclick="mostrarSeccion('secDist', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Distribución <span id="badgeDist" class="ml-1 bg-amber-100 text-amber-700 px-2 rounded-full text-[9px]">0</span></button>
            <button data-sec="secCarga" onclick="mostrarSeccion('secCarga', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Carga <span id="badgeCarga" class="ml-1 bg-green-100 text-green-700 px-2 rounded-full text-[9px]">0</span></button>
            <button data-sec="secGaritaOut" onclick="mostrarSeccion('secGaritaOut', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400">Garita (Out) <span id="badgeOut" class="ml-1 bg-red-100 text-red-700 px-2 rounded-full text-[9px]">0</span></button>
        </nav>

        <main class="flex-grow overflow-y-auto p-6">
            <div id="secDashboard" class="seccion-app hidden max-w-4xl mx-auto">
                <div class="mb-6 flex justify-between items-center bg-white p-4 rounded-2xl border shadow-sm">
                    <h2 class="text-xs font-black uppercase text-slate-400 italic">Tablero Operativo Realtime</h2>
                    <button onclick="descargarReporte()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-black text-[9px] uppercase shadow-lg active:scale-95 transition-all">📥 Descargar Auditoría (Excel)</button>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white border-l-4 border-slate-400 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Programadas</p><p id="countProg" class="text-3xl font-black text-slate-800">0</p></div>
                    <div class="bg-white border-l-4 border-amber-400 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Pend. Arribo</p><p id="countPend" class="text-3xl font-black text-amber-500">0</p></div>
                    <div class="bg-white border-l-4 border-blue-600 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">En Planta</p><p id="countPlanta" class="text-3xl font-black text-blue-700">0</p></div>
                    <div class="bg-white border-l-4 border-green-500 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Despachadas</p><p id="countCarga" class="text-3xl font-black text-green-600">0</p></div>
                </div>
                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm"><div id="lDashboard"></div></div>
            </div>

            <div id="secGarita" class="seccion-app hidden max-w-xl mx-auto"><div class="bg-white border p-10 rounded-[2.5rem] text-center shadow-sm"><button onclick="uiScanner()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black mb-8 text-xs">📷 ESCANEAR QR</button><input id="inputGarita" type="text" placeholder="ID UNICO" class="w-full p-5 bg-slate-50 border rounded-2xl mb-4 text-center font-black uppercase outline-none"><button onclick="registrarIngreso()" class="w-full border-2 border-[#003399] text-[#003399] py-4 rounded-2xl font-black uppercase text-[10px]">Validar Acceso</button></div></div>
            <div id="secBascula" class="seccion-app hidden max-w-xl mx-auto"><div id="lBascula"></div></div>
            <div id="secDist" class="seccion-app hidden max-w-xl mx-auto"><div id="lDist"></div></div>
            <div id="secCarga" class="seccion-app hidden max-w-xl mx-auto"><div id="lCarga"></div></div>
            <div id="secGaritaOut" class="seccion-app hidden max-w-xl mx-auto"><div id="lGaritaOut"></div></div>
        </main>
    </div>

    <div id="mainModal" class="modal-overlay fixed inset-0 z-[300] items-center justify-center p-6 animate-fade">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 border-t-8 border-[#003399] shadow-2xl">
            <h2 id="mTitle" class="text-center font-black text-slate-800 text-xl uppercase italic mb-1 italic">TÍTULO</h2>
            <p id="mLabel" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8 italic">Instrucción</p>
            <input id="mInput" type="text" class="w-full p-5 bg-slate-50 border rounded-2xl mb-8 text-center font-black text-blue-900 text-xl uppercase outline-none">
            <div class="flex gap-4"><button onclick="cerrarModal()" class="flex-1 text-[10px] font-black uppercase text-slate-400 tracking-tighter">Cancelar</button><button onclick="confirmarModal()" class="flex-[2] bg-[#003399] text-white py-4 rounded-xl font-black text-xs uppercase tracking-tighter">Confirmar</button></div>
        </div>
    </div>

    <div id="rc" class="hidden fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-6">
        <div id="reader" class="w-full max-w-sm rounded-3xl overflow-hidden border-4 border-[#003399] mb-8"></div>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase text-slate-400 tracking-widest bg-slate-100 px-8 py-3 rounded-full">Cerrar</button>
    </div>
</body>
</html>
