<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control de Patio</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --agripac-blue: #003399; --agripac-gray: #F4F7FA; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--agripac-gray); }
        .tab-active { border-bottom: 4px solid var(--agripac-blue); color: var(--agripac-blue) !important; font-weight: 800; }
        .modal-blur { background: rgba(0, 51, 153, 0.1); backdrop-filter: blur(8px); }
        .card-entry { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-auth { display: none !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let modalAction = null;

        // ==========================================
        // 1. BLOQUE: SEGURIDAD Y USUARIOS
        // ==========================================
        const USERS = {
            "1111": ["secGarita", "secGaritaOut"], // Garita
            "2222": ["secBascula"],                // Báscula
            "3333": ["secDist"],                   // Distribución
            "4444": ["secCarga"],                  // Carga
            "0000": ["secGarita", "secBascula", "secDist", "secCarga", "secGaritaOut"] // Admin
        };

        window.login = () => {
            const pin = document.getElementById('loginPin').value;
            if(USERS[pin]) {
                localStorage.setItem('agripac_session', pin);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                configurarMenu(pin);
            } else {
                alert("PIN INCORRECTO");
            }
        };

        function configurarMenu(pin) {
            const accesos = USERS[pin];
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if(!accesos.includes(btn.dataset.sec)) btn.classList.add('hidden-auth');
            });
            // Mostrar la primera sección permitida
            mostrarSeccion(accesos[0], document.querySelector(`[data-sec="${accesos[0]}"]`));
        }

        window.logout = () => {
            localStorage.removeItem('agripac_session');
            location.reload();
        };

        // ==========================================
        // 2. BLOQUE: NAVEGACIÓN Y MODALES
        // ==========================================
        window.mostrarSeccion = (id, el) => {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
        };

        window.abrirModal = (titulo, etiqueta, callback) => {
            document.getElementById('mTitle').innerText = titulo;
            document.getElementById('mLabel').innerText = etiqueta;
            document.getElementById('mInput').value = '';
            document.getElementById('modalCont').style.display = 'flex';
            modalAction = callback;
        };

        window.cerrarModal = () => document.getElementById('modalCont').style.display = 'none';

        window.confirmarModal = () => {
            const val = document.getElementById('mInput').value;
            if(!val) return;
            modalAction(val);
            cerrarModal();
        };

        // ==========================================
        // 3. BLOQUE: LÓGICA DE PROCESOS
        // ==========================================
        window.registrarIngreso = async (idManual = null) => {
            const id = idManual || document.getElementById('inputGarita').value;
            if(!id) return;
            try {
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const filas = csv.split("\n").map(r => r.split(","));
                const f = filas.find(row => row[0].trim().toUpperCase() === id.trim().toUpperCase());
                if(f) {
                    push(vehiculosRef, {
                        codigo: f[0].trim(), placa: f[2].trim(), chofer: f[3].trim(), area: f[8].trim(),
                        estado: 'PESAJE_ENTRADA', fecha: new Date().toLocaleString(), anden: '-', pEntrada:0, pSalida:0, precintos: '-'
                    });
                    document.getElementById('inputGarita').value = '';
                } else { alert("NO PLANIFICADO"); }
            } catch (e) { alert("ERROR DE CONEXIÓN"); }
        };

        window.actualizar = (id, data) => update(ref(db, `vehiculos/${id}`), data);
        window.borrar = (id) => { if(confirm("¿CONFIRMAR SALIDA?")) remove(ref(db, `vehiculos/${id}`)); };

        // ==========================================
        // 4. BLOQUE: RENDERIZADO (MONITOR)
        // ==========================================
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const L = { B: document.getElementById('lBascula'), D: document.getElementById('lDist'), C: document.getElementById('lCarga'), G: document.getElementById('lGaritaOut') };
            Object.values(L).forEach(c => c.innerHTML = '');
            if(!data) return;

            Object.keys(data).forEach(key => {
                const v = data[key];
                const card = (btn) => `
                    <div class="bg-white border rounded-xl p-5 mb-4 shadow-sm card-entry">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] font-black text-slate-300 tracking-widest uppercase italic">${v.estado.replace(/_/g,' ')}</span>
                            <span class="text-[10px] font-bold text-blue-900 bg-blue-50 px-2 py-0.5 rounded uppercase">ID: ${v.codigo}</span>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 tracking-tighter mb-1 italic">${v.placa}</h3>
                        <p class="text-[11px] font-bold text-slate-500 uppercase mb-4">${v.chofer} | ${v.area}</p>
                        ${v.anden !== '-' ? `<p class="text-xs font-black text-blue-800 mb-4 tracking-widest uppercase">📍 ANDÉN: ${v.anden}</p>` : ''}
                        ${btn}
                    </div>`;

                if(v.estado === 'PESAJE_ENTRADA') L.B.innerHTML += card(`<button onclick="abrirModal('BÁSCULA','PESO ENTRADA (KG)', (val)=>actualizar('${key}',{pEntrada:val, estado:'DIST_DOCS_CARGA'}))" class="w-full bg-[#003399] text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest">Registrar Pesaje</button>`);
                else if(v.estado === 'DIST_DOCS_CARGA') L.D.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'CARGA_ASIGNAR_ANDEN'})" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold text-xs uppercase">Entregar Docs Carga</button>`);
                else if(v.estado === 'CARGA_ASIGNAR_ANDEN') L.C.innerHTML += card(`<button onclick="abrirModal('CARGA','NÚMERO DE ANDÉN', (val)=>actualizar('${key}',{anden:val, estado:'CARGA_LISTO_INICIO'}))" class="w-full bg-slate-700 text-white py-3 rounded-lg font-bold text-xs uppercase">Asignar Andén</button>`);
                else if(v.estado === 'CARGA_LISTO_INICIO') L.C.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'CARGANDO', inicioCarga: Date.now()})" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-xs uppercase">Iniciar Carga</button>`);
                else if(v.estado === 'CARGANDO') {
                    const m = Math.floor((Date.now() - v.inicioCarga)/60000);
                    L.C.innerHTML += card(`<div class="flex gap-2"><div class="flex-1 bg-red-50 text-red-600 font-bold text-xs flex items-center justify-center rounded-lg animate-pulse">${m} MIN</div><button onclick="abrirModal('CARGA','NÚMERO PRECINTOS', (val)=>actualizar('${key}',{precintos:val, estado:'DIST_DOCS_SALIDA'}))" class="flex-[2] bg-green-600 text-white py-3 rounded-lg font-bold text-xs uppercase">Finalizar Carga</button></div>`);
                }
                else if(v.estado === 'DIST_DOCS_SALIDA') L.D.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'PESAJE_SALIDA'})" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold text-xs uppercase">Entregar Docs Salida</button>`);
                else if(v.estado === 'PESAJE_SALIDA') L.B.innerHTML += card(`<button onclick="abrirModal('BÁSCULA','PESO SALIDA (KG)', (val)=>actualizar('${key}',{pSalida:val, estado:'LISTO_SALIDA'}))" class="w-full bg-[#003399] text-white py-3 rounded-lg font-bold text-xs uppercase">Registrar Pesaje Final</button>`);
                else if(v.estado === 'LISTO_SALIDA') L.G.innerHTML += card(`<button onclick="borrar('${key}')" class="w-full bg-black text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest shadow-xl">Confirmar Salida Física</button>`);
            });
        });

        window.scanner = () => {
            const h = new Html5Qrcode("qr-reader");
            document.getElementById('qr-modal').style.display = 'flex';
            h.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ h.stop(); document.getElementById('qr-modal').style.display='none'; registrarIngreso(t); });
        };
    </script>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 bg-[#003399] flex items-center justify-center p-6 z-[200]">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl text-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-12 mx-auto mb-8">
            <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400 mb-8">Acceso de Personal</h2>
            <input id="loginPin" type="password" placeholder="PIN DE ACCESO" class="w-full p-5 bg-slate-100 rounded-2xl mb-6 text-center font-black tracking-widest outline-none focus:ring-2 focus:ring-blue-900">
            <button onclick="login()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">Ingresar al Patio</button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-white border-b py-6 px-4 flex justify-between items-center sticky top-0 z-40">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-8">
            <button onclick="logout()" class="text-[8px] font-black uppercase text-red-500 tracking-widest bg-red-50 px-3 py-2 rounded-lg">Cerrar Sesión</button>
        </header>

        <nav class="bg-white border-b flex overflow-x-auto no-scrollbar sticky top-[81px] z-30">
            <button data-sec="secGarita" onclick="mostrarSeccion('secGarita', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (In)</button>
            <button data-sec="secBascula" onclick="mostrarSeccion('secBascula', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Báscula</button>
            <button data-sec="secDist" onclick="mostrarSeccion('secDist', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Distribución</button>
            <button data-sec="secCarga" onclick="mostrarSeccion('secCarga', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Carga</button>
            <button data-sec="secGaritaOut" onclick="mostrarSeccion('secGaritaOut', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (Out)</button>
        </nav>

        <main class="max-w-xl mx-auto p-6">
            <div id="secGarita" class="seccion-app hidden">
                <div class="bg-white border p-8 rounded-[2rem] shadow-sm text-center">
                    <button onclick="scanner()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black mb-6 text-xs shadow-lg">📷 ESCANEAR QR</button>
                    <input id="inputGarita" type="text" placeholder="ID MANUAL" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 text-center font-black uppercase focus:ring-2 focus:ring-blue-900 outline-none">
                    <button onclick="registrarIngreso()" class="w-full border-2 border-[#003399] text-[#003399] py-4 rounded-2xl font-black uppercase text-[10px]">Validar Acceso</button>
                </div>
            </div>
            <div id="secBascula" class="seccion-app hidden"><div id="lBascula"></div></div>
            <div id="secDist" class="seccion-app hidden"><div id="lDist"></div></div>
            <div id="secCarga" class="seccion-app hidden"><div id="lCarga"></div></div>
            <div id="secGaritaOut" class="seccion-app hidden"><div id="lGaritaOut"></div></div>
        </main>
    </div>

    <div id="modalCont" class="fixed inset-0 modal-blur z-[300] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl border-t-8 border-[#003399] animate-fade">
            <h2 id="mTitle" class="text-center font-black text-slate-800 text-lg uppercase italic mb-1">TÍTULO</h2>
            <p id="mLabel" class="text-center text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-6 italic">Instrucción</p>
            <input id="mInput" type="text" class="w-full p-4 bg-slate-50 border rounded-xl mb-8 text-center font-black text-blue-900 outline-none uppercase focus:ring-2 focus:ring-blue-900">
            <div class="flex gap-4">
                <button onclick="cerrarModal()" class="flex-1 text-[10px] font-black uppercase text-slate-400">Cancelar</button>
                <button onclick="confirmarModal()" class="flex-[2] bg-[#003399] text-white py-4 rounded-xl font-black text-xs uppercase shadow-xl transition-all">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="qr-modal" class="fixed inset-0 bg-white z-[400] hidden flex-col items-center justify-center p-6">
        <div id="qr-reader" class="w-full max-w-sm rounded-3xl overflow-hidden mb-8 border shadow-xl"></div>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Cerrar Cámara</button>
    </div>

</body>
</html>
