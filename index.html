<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control de Patio</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800;900&display=swap');
        :root { --agripac-blue: #003399; --agripac-gray-bg: #F4F7FA; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        .tab-active { border-bottom: 4px solid var(--agripac-blue); color: var(--agripac-blue) !important; font-weight: 800; }
        .hidden-auth { display: none !important; }
        .modal-blur { background: rgba(0, 51, 153, 0.1); backdrop-filter: blur(8px); display: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let modalAction = null;

        // SEGURIDAD
        const USERS = {
            "1111": ["secGarita", "secGaritaOut"],
            "2222": ["secBascula"],
            "3333": ["secDist"],
            "4444": ["secCarga"],
            "0000": ["secGarita", "secBascula", "secDist", "secCarga", "secGaritaOut", "secDashboard"]
        };

        window.login = () => {
            const pin = document.getElementById('loginPassword').value;
            if(USERS[pin]) {
                localStorage.setItem('agripac_session', pin);
                location.reload();
            } else { alert("PIN INCORRECTO"); }
        };

        window.onload = () => {
            const s = localStorage.getItem('agripac_session');
            if(s) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const accesos = USERS[s];
                document.querySelectorAll('.tab-btn').forEach(b => { if(!accesos.includes(b.dataset.sec)) b.classList.add('hidden-auth'); });
                mostrarSeccion(accesos[0], document.querySelector(`[data-sec="${accesos[0]}"]`));
                if(s === "0000") cargarDashboard();
            }
        };

        window.logout = () => { localStorage.removeItem('agripac_session'); location.reload(); };

        // NAVEGACIÓN
        window.mostrarSeccion = (id, el) => {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
        };

        // DASHBOARD LÓGICA
        async function cargarDashboard() {
            const res = await fetch(URL_SHEET_CSV);
            const csv = await res.text();
            const filasPlan = csv.split("\n").map(r => r.split(",")).slice(1);
            
            onValue(vehiculosRef, (snapshot) => {
                const enPlanta = snapshot.val() || {};
                const listaPlan = document.getElementById('listaPlanDashboard');
                listaPlan.innerHTML = '';
                
                let contIngresados = 0;

                filasPlan.forEach(f => {
                    if(!f[0]) return;
                    const idPlan = f[0].trim().toUpperCase();
                    const placaPlan = f[2];
                    const areaPlan = f[8];
                    
                    // Buscar si este ID de la planificación ya está en Firebase
                    const vehiculoReal = Object.values(enPlanta).find(v => v.codigo.toUpperCase() === idPlan);
                    
                    const statusIcon = vehiculoReal ? '✅' : '⏳';
                    const statusText = vehiculoReal ? `<span class="text-green-600 font-bold">${vehiculoReal.estado}</span>` : '<span class="text-slate-400 font-medium">No ingresado</span>';
                    if(vehiculoReal) contIngresados++;

                    listaPlan.innerHTML += `
                        <div class="flex items-center justify-between p-3 border-b border-slate-100 text-[11px]">
                            <div class="flex items-center gap-3">
                                <span>${statusIcon}</span>
                                <div>
                                    <p class="font-black text-slate-800">${placaPlan} <span class="font-normal text-slate-400">#${idPlan}</span></p>
                                    <p class="text-[9px] text-slate-500 uppercase">${areaPlan}</p>
                                </div>
                            </div>
                            <div class="text-right uppercase">${statusText}</div>
                        </div>`;
                });

                document.getElementById('dashTotal').innerText = filasPlan.length;
                document.getElementById('dashIngresados').innerText = contIngresados;
            });
        }

        // PROCESOS (Simplificados para brevedad)
        window.registrarIngreso = async (idManual = null) => {
            const id = idManual || document.getElementById('inputGarita').value;
            if(!id) return;
            const res = await fetch(URL_SHEET_CSV);
            const csv = await res.text();
            const f = csv.split("\n").map(r => r.split(",")).find(row => row[0].trim().toUpperCase() === id.trim().toUpperCase());
            if(f) {
                push(vehiculosRef, { codigo: f[0].trim(), placa: f[2].trim(), chofer: f[3].trim(), area: f[8].trim(), estado: 'PESAJE_ENTRADA', anden: '-', pEntrada:0, pSalida:0 });
                document.getElementById('inputGarita').value = '';
            } else alert("NO PLANIFICADO");
        };

        // RENDERIZADOS DE OTROS MÓDULOS (Omitidos por espacio, pero funcionales en el código completo)
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const L = { B: document.getElementById('lBascula'), D: document.getElementById('lDist'), C: document.getElementById('lCarga'), G: document.getElementById('lGaritaOut') };
            Object.values(L).forEach(c => c.innerHTML = '');
            if(!data) return;
            Object.keys(data).forEach(key => {
                const v = data[key];
                const card = (btn) => `<div class="bg-white border p-4 rounded-xl mb-3 shadow-sm"><h3 class="text-lg font-black italic">${v.placa}</h3><p class="text-[10px] uppercase mb-3">${v.chofer} | ${v.area}</p>${btn}</div>`;
                // Lógica de dibujo de tarjetas según estado... (Igual a versiones anteriores)
                if(v.estado === 'PESAJE_ENTRADA') L.B.innerHTML += card(`<button onclick="actualizar('${key}', {estado:'DIST_DOCS_CARGA'})" class="w-full bg-[#003399] text-white py-2 rounded text-[10px] font-bold uppercase">Registrar Peso</button>`);
                // ... resto de estados
            });
        });

        window.actualizar = (id, data) => update(ref(db, `vehiculos/${id}`), data);
        window.borrar = (id) => { if(confirm("¿CONFIRMAR SALIDA?")) remove(ref(db, `vehiculos/${id}`)); };

    </script>
</head>
<body class="bg-slate-50">

    <div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center">
        <div class="absolute inset-0 z-0"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSq_4295Q0_tW1vA1FqU7S8GqH-zO4-i5Xv2w&s" class="w-full h-full object-cover"><div class="absolute inset-0 bg-blue-950/50"></div></div>
        <div class="relative z-10 w-full h-full flex items-center p-8 lg:p-20">
            <div class="w-1/2 text-white hidden lg:block pr-20">
                <h1 class="text-6xl font-black tracking-tighter leading-tight">CONTROL DE PATIO <span class="text-[#FFB800]">AGRIPAC</span></h1>
                <p class="text-xl mt-4">Gestión en tiempo real de flota y despachos.</p>
            </div>
            <div class="w-full lg:w-1/2 flex justify-end">
                <div class="bg-white p-12 rounded-3xl shadow-2xl w-full max-w-md animate-fade">
                    <h2 class="text-4xl font-black text-slate-900 mb-8 italic">Sign In</h2>
                    <input type="password" id="loginPassword" placeholder="PIN de Acceso" class="w-full p-5 bg-slate-50 border rounded-xl mb-6 text-lg tracking-widest font-black focus:border-[#003399] outline-none">
                    <button onclick="login()" class="w-full bg-[#003399] text-white py-5 rounded-xl font-black uppercase text-xs shadow-xl hover:bg-blue-800 transition-all">Ingresar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col">
        <header class="bg-white border-b py-4 px-6 flex justify-between items-center">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-8">
            <button onclick="logout()" class="text-[8px] font-black uppercase text-red-500 bg-red-50 px-3 py-2 rounded-lg">Logout</button>
        </header>

        <nav class="bg-white border-b flex overflow-x-auto no-scrollbar">
            <button data-sec="secDashboard" onclick="mostrarSeccion('secDashboard', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Dashboard</button>
            <button data-sec="secGarita" onclick="mostrarSeccion('secGarita', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (In)</button>
            <button data-sec="secBascula" onclick="mostrarSeccion('secBascula', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Báscula</button>
            <button data-sec="secDist" onclick="mostrarSeccion('secDist', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Distribución</button>
            <button data-sec="secCarga" onclick="mostrarSeccion('secCarga', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Carga</button>
            <button data-sec="secGaritaOut" onclick="mostrarSeccion('secGaritaOut', this)" class="tab-btn flex-none px-6 py-4 text-[9px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (Out)</button>
        </nav>

        <main class="flex-grow overflow-y-auto p-6">
            <div id="secDashboard" class="seccion-app animate-fade max-w-4xl mx-auto hidden">
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-[#003399] text-white p-6 rounded-3xl">
                        <p class="text-[10px] font-bold uppercase opacity-60">Planificados Hoy</p>
                        <p id="dashTotal" class="text-4xl font-black">0</p>
                    </div>
                    <div class="bg-white border p-6 rounded-3xl">
                        <p class="text-[10px] font-bold uppercase text-slate-400">Ingresados a Planta</p>
                        <p id="dashIngresados" class="text-4xl font-black text-[#003399]">0</p>
                    </div>
                </div>
                <div class="bg-white border rounded-3xl overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b font-bold text-[10px] uppercase text-slate-500">Planificación del día vs Estatus Real</div>
                    <div id="listaPlanDashboard" class="max-h-[400px] overflow-y-auto">
                        </div>
                </div>
            </div>

            <div id="secGarita" class="seccion-app hidden max-w-xl mx-auto">
                <div class="bg-white border p-8 rounded-3xl text-center shadow-sm">
                    <button onclick="registrarIngreso()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black uppercase text-[10px]">Validar Acceso Manual</button>
                    <input id="inputGarita" type="text" placeholder="ID MANUAL" class="w-full mt-4 p-4 border rounded-xl text-center font-black outline-none focus:border-[#003399]">
                </div>
            </div>

            <div id="secBascula" class="seccion-app hidden max-w-xl mx-auto"><div id="lBascula"></div></div>
            <div id="secDist" class="seccion-app hidden max-w-xl mx-auto"><div id="lDist"></div></div>
            <div id="secCarga" class="seccion-app hidden max-w-xl mx-auto"><div id="lCarga"></div></div>
            <div id="secGaritaOut" class="seccion-app hidden max-w-xl mx-auto"><div id="lGaritaOut"></div></div>
        </main>
    </div>

</body>
</html>
