<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Gestión de Patio v5.4</title>
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700;800&display=swap');
        :root { --agripac-blue: #003399; --bg-gray: #F4F7FA; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-gray); margin: 0; overflow: hidden; }
        .tab-active { border-bottom: 4px solid var(--agripac-blue); color: var(--agripac-blue) !important; font-weight: 800; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove, get, child, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const historialRef = ref(db, 'historial');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        // --- GLOBAL PARA CRONÓMETROS ---
        window.vehiculosCargando = {};
        setInterval(() => {
            const ahora = Date.now();
            for (const [codigo, inicio] of Object.entries(window.vehiculosCargando)) {
                if (!inicio) continue;
                const diff = Math.floor((ahora - inicio) / 1000);
                const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                const txt = `⏱ ${h}:${m}:${s}`;
                
                const eMon = document.getElementById(`tMon_${codigo}`);
                if (eMon) eMon.innerText = txt;
                const eDas = document.getElementById(`tDas_${codigo}`);
                if (eDas) eDas.innerText = txt;
            }
        }, 1000);

        // --- FUNCIÓN DE AUDITORÍA ---
        const registrarMovimiento = async (codigo, accion) => {
            const session = JSON.parse(localStorage.getItem('agripac_session'));
            const log = {
                codigo: codigo,
                estado: accion,
                fechaMovimiento: new Date().toISOString(),
                usuarioAccion: session ? session.email : "Sistema"
            };
            await push(ref(db, 'historial'), log);
        };

        // --- AUTH ---
        window.login = async () => {
            const emailInput = document.getElementById('loginUser').value.trim().toLowerCase();
            const passInput = document.getElementById('loginPassword').value.trim();
            const btn = document.querySelector('button[onclick="login()"]');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, 'usuarios'));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    let encontrado = null;
                    Object.keys(data).forEach(key => {
                        const u = data[key];
                        if (u.email.trim().toLowerCase() === emailInput && u.pass.trim() === passInput) { encontrado = u; }
                    });
                    if (encontrado) {
                        localStorage.setItem('agripac_session', JSON.stringify(encontrado));
                        location.reload();
                    } else {
                        alert("Correo o Clave incorrectos.");
                        btn.innerText = "ACCEDER AL PATIO";
                        btn.disabled = false;
                    }
                }
            } catch (e) { alert("Error: " + e.message); btn.disabled = false; }
        };

        window.logout = () => { localStorage.removeItem('agripac_session'); location.reload(); };

        window.mostrarSeccion = (id, el) => {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
        };

        // --- DASHBOARD ---
        const moduloDashboard = {
            init: async function() {
                try {
                    const hoy = new Date();
                    const fechaHoy = String(hoy.getDate()).padStart(2, '0') + "/" + 
                                     String(hoy.getMonth() + 1).padStart(2, '0') + "/" + hoy.getFullYear();

                    const res = await fetch(URL_SHEET_CSV);
                    const csv = await res.text();
                    const filasPlan = csv.split("\n").map(r => r.split(",")).slice(1).filter(f => f[5] && f[5].trim() === fechaHoy);

                    onValue(ref(db), (snapshot) => {
                        const base = snapshot.val() || {};
                        const activos = base.vehiculos || {};
                        const historial = base.historial || {};
                        const cont = document.getElementById('lDashboard');
                        let counts = { programadas: filasPlan.length, pendientes: 0, enPlanta: 0, despachadas: 0 };

                        const htmlLista = filasPlan.map(f => {
                            const idPlan = f[0].trim().toUpperCase();
                            const vReal = Object.values(activos).find(v => v.codigo.toUpperCase() === idPlan);
                            const vHist = Object.values(historial).find(v => v.codigo.toUpperCase() === idPlan && v.estado === "SALIDA DEFINITIVA");
                            
                            let statusDesc = "PENDIENTE";
                            let statusColor = "text-slate-400";
                            let bgStatus = "bg-slate-50";
                            let timerHTML = "";

                            if (vReal) {
                                counts.enPlanta++;
                                statusDesc = vReal.estado.replace(/_/g,' ');
                                statusColor = "text-blue-800 font-bold";
                                bgStatus = "bg-blue-100 border border-blue-200";
                                
                                // Inyectar UI del cronómetro en Dashboard
                                if(vReal.estado === 'CARGANDO' && vReal.inicioCarga) {
                                    timerHTML = `<br><div id="tDas_${vReal.codigo}" class="text-[9px] font-mono text-orange-600 font-black mt-2 bg-orange-50 inline-block px-2 py-1 rounded shadow-inner">⏱ 00:00:00</div>`;
                                } else if (vReal.finCarga && vReal.inicioCarga) {
                                    const diff = Math.floor((vReal.finCarga - vReal.inicioCarga) / 1000);
                                    const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                                    const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                                    const s = String(diff % 60).padStart(2, '0');
                                    timerHTML = `<br><div class="text-[9px] font-mono text-slate-600 font-black mt-2 bg-slate-100 inline-block px-2 py-1 rounded shadow-inner">⏱ ${h}:${m}:${s}</div>`;
                                }
                            } else if (vHist) {
                                counts.despachadas++;
                                statusDesc = "DESPACHADO";
                                statusColor = "text-green-700 font-bold";
                                bgStatus = "bg-green-100 border border-green-200";
                            } else {
                                counts.pendientes++;
                            }

                            return `
                                <tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                    <td class="p-4 text-[10px] font-bold text-slate-700 uppercase">${f[1]}</td> 
                                    <td class="p-4 text-[10px] text-slate-600 font-medium uppercase">${f[3]}</td>
                                    <td class="p-4 text-[10px] text-slate-800 font-black uppercase">${f[2]}</td>
                                    <td class="p-4 text-[10px] text-slate-500 uppercase font-semibold">${f[7] || 'N/A'}</td>
                                    <td class="p-4 text-right">
                                        <span class="px-3 py-1 rounded-lg text-[8px] font-black uppercase ${bgStatus} ${statusColor}">
                                            ${statusDesc}
                                        </span>
                                        ${timerHTML}
                                    </td>
                                </tr>`;
                        }).join('');

                        document.getElementById('countProg').innerText = counts.programadas;
                        document.getElementById('countPend').innerText = counts.pendientes;
                        document.getElementById('countPlanta').innerText = counts.enPlanta;
                        document.getElementById('countCarga').innerText = counts.despachadas;

                        cont.innerHTML = `
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-50 text-[9px] uppercase tracking-widest text-slate-500 font-black border-b">
                                            <th class="p-4">Ruta</th><th class="p-4">Chofer</th><th class="p-4">Placa</th><th class="p-4">Operador Log.</th><th class="p-4 text-right">Estatus Actual</th>
                                        </tr>
                                    </thead>
                                    <tbody>${htmlLista || '<tr><td colspan="5" class="p-10 text-center">Sin datos</td></tr>'}</tbody>
                                </table>
                            </div>`;
                    });
                } catch(e) { console.error(e); }
            }
        };

        // --- PROCESOS CON REGISTRO DE MOVIMIENTO ---
        window.procUpdate = async (id, data) => {
            const vRef = ref(db, `vehiculos/${id}`);
            const snap = await get(vRef);
            if(snap.exists()) {
                await registrarMovimiento(snap.val().codigo, data.estado.replace(/_/g,' '));
            }
            update(vRef, data).catch(e => alert("Error: " + e.message));
        };
        
        window.procDelete = async (id) => {
            if(!confirm("¿CONFIRMAR SALIDA DEFINITIVA Y ARCHIVAR?")) return;
            try {
                const vehiculoRef = ref(db, `vehiculos/${id}`);
                const snapshot = await get(vehiculoRef);
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    await registrarMovimiento(data.codigo, "SALIDA DEFINITIVA");
                    await remove(vehiculoRef);
                    alert("Vehículo despachado correctamente.");
                }
            } catch (e) { alert("Error: " + e.message); }
        };

        window.registrarIngreso = async (idManual = null) => {
            const id = idManual || document.getElementById('inputGarita').value.trim().toUpperCase();
            if(!id) return;
            try {
                const snapshotActual = await get(vehiculosRef);
                if (snapshotActual.exists()) {
                    const vehiculosActivos = snapshotActual.val();
                    const yaExiste = Object.values(vehiculosActivos).some(v => v.codigo.toUpperCase() === id);
                    if (yaExiste) { alert("⚠️ YA REGISTRADO"); return; }
                }
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const f = csv.split("\n").map(r => r.split(",")).find(row => row[0].trim().toUpperCase() === id);
                if(f) {
                    const codigo = f[0].trim();
                    await push(vehiculosRef, {
                        codigo: codigo, 
                        placa: f[2].trim(), 
                        chofer: f[3].trim(), 
                        area: f[8].trim(),
                        telefono: f[4] ? f[4].trim() : '',
                        ruta: f[1] ? f[1].trim() : '', 
                        estado: 'PESAJE_ENTRADA', anden: '-', pEntrada:0, pSalida:0, fechaIngreso: new Date().toLocaleString()
                    });
                    await registrarMovimiento(codigo, "INGRESO GARITA");
                    document.getElementById('inputGarita').value = '';
                } else alert("❌ ID NO PLANIFICADO");
            } catch (e) { alert("Error de red"); }
        };

window.descargarReporte = async () => {
    const snapshot = await get(ref(db, 'historial'));
    if (!snapshot.exists()) return alert("Sin movimientos registrados aún.");

    const data = snapshot.val();
    
    // 1. Encabezados del Excel
    const filasExcel = [
        ["ID UNICO", "Accion", "Fecha", "Hora", "Usuario"]
    ];

    // 2. Procesar los datos de Firebase
    Object.values(data).forEach(v => {
        const fechaObj = v.fechaMovimiento ? new Date(v.fechaMovimiento) : new Date();
        
        // Formato DD/MM/YYYY
        const fecha = fechaObj.toLocaleDateString('es-EC'); 
        
        // Formato 24 Horas (HH:mm) sin AM/PM
        const hora = fechaObj.toLocaleTimeString('es-EC', { 
            hour: '2-digit', 
            minute: '2-digit', 
            hour12: false 
        });

        filasExcel.push([
            v.codigo,          // ID UNICO
            v.estado,          // Accion
            fecha,             // Fecha
            hora,              // Hora
            v.usuarioAccion    // Usuario
        ]);
    });

    // 3. Generar el libro de Excel usando SheetJS
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(filasExcel);

    // Ajuste de ancho de columnas (opcional pero recomendado)
    ws['!cols'] = [{ wch: 15 }, { wch: 30 }, { wch: 12 }, { wch: 10 }, { wch: 25 }];

    XLSX.utils.book_append_sheet(wb, ws, "Auditoria Movimientos");

    // 4. Descargar archivo nativo .xlsx
    const nombreArchivo = `Reporte_Agripac_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`;
    XLSX.writeFile(wb, nombreArchivo);
};

        // --- FUNCIÓN PARA ENVIAR WHATSAPP (SIN EMOJIS) ---
        window.enviarWhatsApp = (telefono, chofer, placa, ruta, anden) => {
            if (!telefono || telefono === '') {
                alert("El conductor no tiene número de teléfono registrado en la planificación.");
                return;
            }
            
            let tel = telefono.replace(/\D/g, ''); 
            if (tel.startsWith('0')) tel = '593' + tel.substring(1);
            else if (tel.length === 9) tel = '593' + tel; 

            const mensaje = `*AGRIPAC - NOTIFICACIÓN DE LOGÍSTICA*\n\n` +
                            `Estimado/a *${chofer}*,\n\n` +
                            `Le informamos que su unidad con placa *${placa}* (Destino: ${ruta}) ha sido asignada al *Andén ${anden}*.\n\n` +
                            `*IMPORTANTE:* Por favor, manténgase en espera en su ubicación actual. El despachador le confirmará en breve el momento exacto en el que deberá acercarse a parquear para iniciar el proceso de carga.\n\n` +
                            `Atentamente,\nControl de Patio Agripac`;

            const url = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        };

        window.enviarWhatsAppParqueo = (telefono, chofer, placa, anden, despachador) => {
            if (!telefono || telefono === '') { alert("El conductor no tiene número registrado."); return; }
            let tel = telefono.replace(/\D/g, ''); 
            if (tel.startsWith('0')) tel = '593' + tel.substring(1); else if (tel.length === 9) tel = '593' + tel; 

            const mensaje = `*AGRIPAC - AUTORIZACIÓN DE INGRESO AL ANDÉN*\n\n` +
                            `Estimado/a *${chofer}*,\n\n` +
                            `Su unidad con placa *${placa}* ha sido autorizada para ingresar a la zona de carga.\n\n` +
                            `*INSTRUCCIÓN:* Por favor, acérquese al *Andén ${anden}* para parquearse inmediatamente.\n` +
                            `*Responsable de Carga:* ${despachador}\n\n` +
                            `El responsable le indicará en el andén el momento exacto en que iniciará la carga.\n\n` +
                            `Atentamente,\nControl de Patio Agripac`;

            window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(mensaje)}`, '_blank');
        };
        
        // --- MONITOR DE PATIO ---
        // --- MONITOR DE PATIO ---
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const L = { 'secBascula': document.getElementById('lBascula'), 'secDist': document.getElementById('lDist'), 'secCarga': document.getElementById('lCarga'), 'secGaritaOut': document.getElementById('lGaritaOut') };
            let counts = { bascula: 0, dist: 0, carga: 0, out: 0 };
            
            // Reiniciamos contadores y registro de cronómetros
            window.vehiculosCargando = {};
            Object.values(L).forEach(s => s.innerHTML = '');

            if (data) {
                Object.keys(data).forEach(key => {
                    const v = data[key];
                    if (v.estado === 'PESAJE_ENTRADA' || v.estado === 'PESAJE_SALIDA') counts.bascula++;
                    if (v.estado === 'DIST_DOCS_CARGA' || v.estado === 'DIST_DOCS_SALIDA') counts.dist++;
                    if (v.estado.includes('CARGA')) counts.carga++;
                    if (v.estado === 'LISTO_SALIDA') counts.out++;

                    // Lógica del Cronómetro Ocultando en Báscula y Garita Out
                    let timerUI = '';
                    
                    if (v.estado === 'CARGANDO' && v.inicioCarga) {
                        window.vehiculosCargando[v.codigo] = v.inicioCarga; 
                        timerUI = `<div id="tMon_${v.codigo}" class="text-[10px] font-mono font-black text-orange-600 bg-orange-50 px-3 py-1 rounded-lg inline-block mb-3 border border-orange-200 shadow-inner">⏱ 00:00:00</div>`;
                    } else if (v.finCarga && v.inicioCarga && (v.estado === 'CARGA_REGISTRAR_PRECINTOS' || v.estado === 'DIST_DOCS_SALIDA')) {
                        // SOLO MUESTRA EL TIEMPO CONGELADO EN ESTOS DOS ESTADOS (PRECINTOS Y DOCS DE SALIDA)
                        const diff = Math.floor((v.finCarga - v.inicioCarga) / 1000);
                        const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                        const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                        const s = String(diff % 60).padStart(2, '0');
                        timerUI = `<div class="text-[10px] font-mono font-black text-slate-600 bg-slate-100 px-3 py-1 rounded-lg inline-block mb-3 border border-slate-300 shadow-inner">⏱ Tiempo de Carga: ${h}:${m}:${s}</div>`;
                    }

                    const txtDespachador = v.despachador ? `<span class="text-[9px] text-indigo-600 font-bold bg-indigo-50 px-2 rounded-full ml-2">Resp: ${v.despachador}</span>` : '';

                    const card = (btn) => `
                        <div class="bg-white border rounded-2xl p-6 mb-4 shadow-sm animate-fade">
                            <div class="flex items-center mb-2">
                                <span class="block text-[9px] font-black text-slate-400 uppercase tracking-widest">${v.estado.replace(/_/g,' ')}</span>
                                ${txtDespachador}
                            </div>
                            ${timerUI}
                            <h3 class="text-2xl font-black text-slate-800 italic leading-none mb-1">${v.placa}</h3>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-5 tracking-wider">${v.chofer} | ${v.ruta || v.area}</p>
                            ${btn}
                        </div>`;

                    if(v.estado === 'PESAJE_ENTRADA') L.secBascula.innerHTML += card(`<button onclick="window.abrirModal('BÁSCULA','PESO ENTRADA', (val)=>window.procUpdate('${key}',{pEntrada:val, estado:'PESAJE_ENTRADA_REGISTRADO'}))" class="w-full bg-[#003399] text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Registrar Peso</button>`);
                    else if(v.estado === 'PESAJE_ENTRADA_REGISTRADO') L.secDist.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'DIST_DOCS_CARGA'})" class="w-full bg-slate-700 text-white py-4 rounded-xl font-black text-[10px] uppercase">Docs Carga</button>`);
                    else if(v.estado === 'DIST_DOCS_CARGA') L.secCarga.innerHTML += card(`
                        <button onclick="window.abrirModal('ASIGNACIÓN','NÚMERO DE ANDÉN', (val) => { 
                            window.procUpdate('${key}',{anden:val, estado:'CARGA_ESPERA_PARQUEO'});
                            window.enviarWhatsApp('${v.telefono || ''}', '${v.chofer}', '${v.placa}', '${v.ruta || v.area}', val);
                        })" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black text-[10px] uppercase">Asignar Andén y Notificar (WP)</button>
                    `);
                    else if(v.estado === 'CARGA_ESPERA_PARQUEO') L.secCarga.innerHTML += card(`
                        <button onclick="window.abrirModal('AUTORIZACIÓN','NOMBRE DEL DESPACHADOR', (val) => {
                            window.procUpdate('${key}',{despachador:val, estado:'CARGA_LISTO_INICIO'});
                            window.enviarWhatsAppParqueo('${v.telefono || ''}', '${v.chofer}', '${v.placa}', '${v.anden}', val);
                        })" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Autorizar Parqueo y Notificar (WP)</button>
                    `);
                    else if(v.estado === 'CARGA_LISTO_INICIO') L.secCarga.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'CARGANDO', inicioCarga: Date.now()})" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase">Iniciar Carga (Reloj)</button>`);
                    else if(v.estado === 'CARGANDO') L.secCarga.innerHTML += card(`<button onclick="if(confirm('¿ESTÁ SEGURO DE FINALIZAR LA CARGA? El cronómetro se detendrá definitivamente.')) { window.procUpdate('${key}', {estado:'CARGA_REGISTRAR_PRECINTOS', finCarga: Date.now()}) }" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-[10px] uppercase animate-pulse">Confirmar Fin de Carga</button>`);
                    else if(v.estado === 'CARGA_REGISTRAR_PRECINTOS') L.secCarga.innerHTML += card(`<button onclick="window.abrirModal('SEGURIDAD','NÚMEROS DE PRECINTOS', (val)=>window.procUpdate('${key}',{precintos:val, estado:'DIST_DOCS_SALIDA'}))" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Registrar Precintos</button>`);
                    else if(v.estado === 'DIST_DOCS_SALIDA') L.secDist.innerHTML += card(`<button onclick="window.procUpdate('${key}', {estado:'PESAJE_SALIDA'})" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-[10px] uppercase">Docs Salida</button>`);
                    else if(v.estado === 'PESAJE_SALIDA') L.secBascula.innerHTML += card(`<button onclick="window.abrirModal('BÁSCULA','PESO SALIDA', (val)=>window.procUpdate('${key}',{pSalida:val, estado:'LISTO_SALIDA'}))" class="w-full bg-[#003399] text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg">Peso Salida</button>`);
                    else if(v.estado === 'LISTO_SALIDA') L.secGaritaOut.innerHTML += card(`<button onclick="window.procDelete('${key}')" class="w-full bg-black text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-2xl">Confirmar Salida</button>`);
                });
            }
            document.getElementById('badgeBascula').innerText = counts.bascula;
            document.getElementById('badgeDist').innerText = counts.dist;
            document.getElementById('badgeCarga').innerText = counts.carga;
            document.getElementById('badgeOut').innerText = counts.out;
        });

        window.abrirModal = (titulo, etiqueta, callback) => {
            document.getElementById('mTitle').innerText = titulo;
            document.getElementById('mLabel').innerText = etiqueta;
            document.getElementById('mInput').value = '';
            document.getElementById('mainModal').style.display = 'flex';
            window.modalAction = callback;
        };
        window.cerrarModal = () => document.getElementById('mainModal').style.display = 'none';
        window.confirmarModal = () => {
            const val = document.getElementById('mInput').value;
            if(!val) return;
            window.modalAction(val);
            cerrarModal();
        };

        window.onload = () => {
            const session = localStorage.getItem('agripac_session');
            if (session) {
                const user = JSON.parse(session);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                const roles = user.roles || [];
                document.querySelectorAll('.tab-btn').forEach(b => { if(!roles.includes(b.dataset.sec)) b.classList.add('hidden-auth'); });
                const visible = document.querySelector('.tab-btn:not(.hidden-auth)');
                if (visible) { mostrarSeccion(visible.dataset.sec, visible); if(roles.includes("secDashboard")) moduloDashboard.init(); }
            }
        };

        window.uiScanner = () => {
            const h = new Html5Qrcode("reader");
            document.getElementById('rc').classList.remove('hidden');
            h.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{ h.stop(); document.getElementById('rc').classList.add('hidden'); registrarIngreso(t); });
        };
    </script>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 z-[200] flex items-center justify-center">
        <div class="absolute inset-0 z-0"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSq_4295Q0_tW1vA1FqU7S8GqH-zO4-i5Xv2w&s" class="w-full h-full object-cover shadow-inner"><div class="absolute inset-0 bg-blue-950/40"></div></div>
        <div class="relative z-10 w-full h-full flex items-center p-8 lg:p-20">
            <div class="w-1/2 text-white hidden lg:block pr-20">
                <h1 class="text-7xl font-black italic tracking-tighter mb-4 italic">CONTROL DE PATIO <br><span class="text-[#FFB800]">AGRIPAC</span></h1>
            </div>
            <div class="w-full lg:w-1/2 flex justify-end">
                <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-lg animate-fade">
                    <h2 class="text-5xl font-black text-slate-900 mb-10 italic tracking-tighter">Sign In</h2>
                    <div class="space-y-6">
                        <input type="email" id="loginUser" placeholder="usuario@agripac.com.ec" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-[#003399] text-lg">
                        <input type="password" id="loginPassword" placeholder="Password" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold outline-none focus:border-[#003399] text-lg">
                        <button onclick="login()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Acceder al Patio</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden h-screen flex flex-col">
<header class="bg-white border-b py-5 px-8 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgdU9ENZe0xEEBIekcna9hIY1LQynypXsvGw&s" class="h-10">
                <h1 class="text-xl lg:text-2xl font-black text-[#003399] uppercase italic tracking-tighter">
                    Planificación de distribución Balanfarina PT
                </h1>
            </div>
            <button onclick="logout()" class="text-[9px] font-black uppercase text-red-500 bg-red-50 px-4 py-2 rounded-xl border border-red-100 hover:bg-red-100 transition-colors">
                Cerrar Sesión
            </button>
        </header>

        <nav class="bg-white border-b flex overflow-x-auto no-scrollbar sticky top-[77px] z-30">
            <button data-sec="secDashboard" onclick="mostrarSeccion('secDashboard', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Dashboard</button>
            <button data-sec="secGarita" onclick="mostrarSeccion('secGarita', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (In) <span id="badgeGarita" class="ml-1 bg-slate-100 px-2 py-0.5 rounded-full text-[9px]">0</span></button>
            <button data-sec="secBascula" onclick="mostrarSeccion('secBascula', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Báscula <span id="badgeBascula" class="ml-1 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-[9px]">0</span></button>
            <button data-sec="secDist" onclick="mostrarSeccion('secDist', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Distribución <span id="badgeDist" class="ml-1 bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-[9px]">0</span></button>
            <button data-sec="secCarga" onclick="mostrarSeccion('secCarga', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Carga <span id="badgeCarga" class="ml-1 bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-[9px]">0</span></button>
            <button data-sec="secGaritaOut" onclick="mostrarSeccion('secGaritaOut', this)" class="tab-btn flex-none px-6 py-5 text-[10px] font-bold uppercase text-slate-400 whitespace-nowrap">Garita (Out) <span id="badgeOut" class="ml-1 bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-[9px]">0</span></button>
        </nav>

        <main class="flex-grow overflow-y-auto p-6">
            <div id="secDashboard" class="seccion-app hidden max-w-4xl mx-auto">
                <div class="mb-4 flex justify-end">
                    <button onclick="descargarReporte()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] uppercase shadow-lg">📥 Excel Movimientos</button>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white border-l-4 border-slate-400 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Programadas</p><p id="countProg" class="text-3xl font-black text-slate-800">0</p></div>
                    <div class="bg-white border-l-4 border-amber-400 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Pend. Arribo</p><p id="countPend" class="text-3xl font-black text-amber-500">0</p></div>
                    <div class="bg-white border-l-4 border-blue-600 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">En Planta</p><p id="countPlanta" class="text-3xl font-black text-blue-700">0</p></div>
                    <div class="bg-white border-l-4 border-green-500 p-5 rounded-xl shadow-sm"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Despachadas</p><p id="countCarga" class="text-3xl font-black text-green-600">0</p></div>
                </div>
                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm"><div id="lDashboard"></div></div>
            </div>

            <div id="secGarita" class="seccion-app hidden max-w-xl mx-auto"><div class="bg-white border p-10 rounded-[2.5rem] text-center shadow-sm"><button onclick="uiScanner()" class="w-full bg-[#003399] text-white py-5 rounded-2xl font-black mb-8 text-xs">📷 ESCANEAR QR</button><input id="inputGarita" type="text" placeholder="ID" class="w-full p-5 bg-slate-50 border rounded-2xl mb-4 text-center font-black uppercase outline-none"><button onclick="registrarIngreso()" class="w-full border-2 border-[#003399] text-[#003399] py-4 rounded-2xl font-black uppercase text-[10px]">Validar Acceso</button></div></div>
            <div id="secBascula" class="seccion-app hidden max-w-xl mx-auto"><div id="lBascula"></div></div>
            <div id="secDist" class="seccion-app hidden max-w-xl mx-auto"><div id="lDist"></div></div>
            <div id="secCarga" class="seccion-app hidden max-w-xl mx-auto"><div id="lCarga"></div></div>
            <div id="secGaritaOut" class="seccion-app hidden max-w-xl mx-auto"><div id="lGaritaOut"></div></div>
        </main>
    </div>

    <div id="mainModal" class="modal-overlay fixed inset-0 z-[300] items-center justify-center p-6 animate-fade">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 border-t-8 border-[#003399] shadow-2xl">
            <h2 id="mTitle" class="text-center font-black text-slate-800 text-xl uppercase italic mb-1 italic">TÍTULO</h2>
            <p id="mLabel" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-8 italic">Instrucción</p>
            <input id="mInput" type="text" class="w-full p-5 bg-slate-50 border rounded-2xl mb-8 text-center font-black text-blue-900 text-xl uppercase outline-none">
            <div class="flex gap-4"><button onclick="cerrarModal()" class="flex-1 text-[10px] font-black uppercase text-slate-400 tracking-tighter">Cancelar</button><button onclick="confirmarModal()" class="flex-[2] bg-[#003399] text-white py-4 rounded-xl font-black text-xs uppercase tracking-tighter">Confirmar</button></div>
        </div>
    </div>

    <div id="rc" class="hidden fixed inset-0 bg-white z-[500] flex flex-col items-center justify-center p-6">
        <div id="reader" class="w-full max-w-sm rounded-3xl overflow-hidden border-4 border-[#003399] mb-8"></div>
        <button onclick="location.reload()" class="text-[10px] font-black uppercase text-slate-400 tracking-widest bg-slate-100 px-8 py-3 rounded-full">Cerrar</button>
    </div>

</body>
</html>
