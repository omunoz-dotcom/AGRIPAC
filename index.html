<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema de Control de Patio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURACIÓN DE FIREBASE CON TUS DATOS REALES
        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79",
            measurementId: "G-J4MGT2J80C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');

        // 1. REGISTRO EN GARITA
        window.registrarIngreso = function() {
            const codigo = document.getElementById('codigoUnico').value;
            const placa = document.getElementById('placa').value;
            if(!codigo || !placa) return alert("Por favor, ingrese Código y Placa");

            push(vehiculosRef, {
                codigo,
                placa,
                estado: 'Ingreso a Planta',
                fechaIngreso: new Date().toLocaleString(),
                anden: 'Sin asignar',
                pesoInicial: 0,
                pesoFinal: 0,
                precintos: '',
                timestamp: Date.now()
            });
            document.getElementById('codigoUnico').value = '';
            document.getElementById('placa').value = '';
        };

        // 2. LÓGICA DE CAMBIO DE ESTADOS
        window.cambiarEstado = function(id, nuevoEstado) {
            const actualizaciones = { estado: nuevoEstado };
            
            if(nuevoEstado === 'En Carga') {
                const anden = prompt("Asigne un número de Andén:");
                if(!anden) return;
                actualizaciones.anden = anden;
                actualizaciones.inicioCarga = Date.now();
            }
            
            if(nuevoEstado === 'Pesaje Final') {
                const precintos = prompt("Ingrese los números de precintos de seguridad:");
                if(!precintos) return;
                actualizaciones.precintos = precintos;
            }

            update(ref(db, `vehiculos/${id}`), actualizaciones);
        };

        // 3. REGISTRO DE PESOS (BÁSCULA)
        window.registrarPeso = function(id, tipo) {
            const peso = prompt(`Ingrese el peso ${tipo} (kg):`);
            if(!peso) return;
            const campo = tipo === 'inicial' ? 'pesoInicial' : 'pesoFinal';
            update(ref(db, `vehiculos/${id}`), { [campo]: peso });
        };

        // 4. ELIMINAR/SALIDA
        window.darSalida = function(id) {
            if(confirm("¿Confirmar salida del vehículo y cerrar proceso?")) {
                remove(ref(db, `vehiculos/${id}`));
            }
        };

        // ESCUCHAR DATOS EN TIEMPO REAL
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaVehiculos');
            contenedor.innerHTML = '';
            
            if(!data) {
                contenedor.innerHTML = '<p class="text-center text-gray-400 mt-10">No hay vehículos registrados en planta actualmente.</p>';
                return;
            }

            Object.keys(data).forEach(id => {
                const v = data[id];
                let cronometro = "";
                
                if(v.estado === 'En Carga' && v.inicioCarga) {
                    const min = Math.floor((Date.now() - v.inicioCarga) / 60000);
                    cronometro = `<span class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs font-bold animate-pulse">${min} MIN EN CARGA</span>`;
                }

                const card = `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 ${v.estado === 'En Carga' ? 'border-blue-600' : 'border-gray-200'} mb-4 transition-all hover:shadow-md">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h3 class="text-xl font-black text-blue-900">${v.placa} <span class="text-sm font-normal text-gray-400 font-mono">#${v.codigo}</span></h3>
                                <p class="text-xs text-gray-400 mb-2 italic">Ingresó: ${v.fechaIngreso}</p>
                                <div class="grid grid-cols-1 gap-1">
                                    <p class="text-sm">📍 <b>Estado:</b> <span class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded font-bold">${v.estado}</span></p>
                                    <p class="text-sm font-medium">🚚 <b>Andén:</b> <span class="text-blue-700">${v.anden}</span></p>
                                    <p class="text-sm font-medium">⚖️ <b>Báscula:</b> In: ${v.pesoInicial} kg | Out: ${v.pesoFinal} kg</p>
                                    ${v.precintos ? `<p class="text-sm font-medium">🔒 <b>Precintos:</b> <span class="text-green-700">${v.precintos}</span></p>` : ''}
                                </div>
                            </div>
                            <div class="flex flex-wrap gap-2 justify-end">
                                ${cronometro}
                                ${v.estado === 'Ingreso a Planta' ? `<button onclick="registrarPeso('${id}', 'inicial')" class="bg-slate-700 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-slate-800">Báscula Entrada</button>` : ''}
                                ${v.estado === 'Ingreso a Planta' ? `<button onclick="cambiarEstado('${id}', 'En Carga')" class="bg-blue-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-blue-700 shadow-sm">Asignar Andén</button>` : ''}
                                ${v.estado === 'En Carga' ? `<button onclick="cambiarEstado('${id}', 'Pesaje Final')" class="bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-green-700 shadow-sm">Cerrar Carga</button>` : ''}
                                ${v.estado === 'Pesaje Final' ? `<button onclick="registrarPeso('${id}', 'final')" class="bg-slate-700 text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-slate-800 font-bold">Báscula Salida</button>` : ''}
                                <button onclick="darSalida('${id}')" class="bg-red-50 text-red-500 text-xs font-bold px-3 py-2 rounded-lg border border-red-100 hover:bg-red-500 hover:text-white">Dar Salida</button>
                            </div>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += card;
            });
        });

        // Refrescar automáticamente cada minuto solo para actualizar cronómetros visuales
        setInterval(() => { onValue(); }, 60000);
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <nav class="bg-blue-900 text-white p-5 shadow-xl mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-900 font-black">A</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">AGRIPAC <span class="font-light text-blue-300">Patio</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span>
                <span class="text-xs font-bold text-blue-100 uppercase tracking-widest">Sincronizado</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8 px-4 pb-12">
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-xl shadow-blue-900/5 border border-blue-50 sticky top-8">
                <div class="flex items-center gap-2 mb-6">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center text-xl">🚧</div>
                    <h2 class="text-lg font-black text-gray-800 uppercase tracking-tight">Garita de Ingreso</h2>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Código Único</label>
                        <input id="codigoUnico" type="text" placeholder="Ejem: 9982X" class="w-full mt-1 p-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-bold">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1">Placa Camión</label>
                        <input id="placa" type="text" placeholder="Ejem: GBA-1234" class="w-full mt-1 p-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all font-bold uppercase">
                    </div>
                    <button onclick="registrarIngreso()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                        REGISTRAR INGRESO
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-lg font-black text-gray-800 uppercase tracking-tight">Monitor de Patio en Vivo</h2>
                <span class="text-xs font-bold text-gray-400" id="currentDate"></span>
            </div>
            <div id="listaVehiculos">
                </div>
        </div>
    </main>

    <script>
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
