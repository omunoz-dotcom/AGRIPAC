<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Validación de Planificación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');

        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        let html5QrCode;

        // --- FUNCIÓN DE VALIDACIÓN (QR O MANUAL) ---
        window.validarEntrada = async function(idEscaneado = null) {
            // Si no viene del QR, lo toma del input manual
            const idABuscar = idEscaneado || document.getElementById('inputManual').value;
            
            if (!idABuscar) return alert("Por favor ingrese o escanee un código");

            try {
                const response = await fetch(URL_SHEET_CSV);
                const data = await response.text();
                const filas = data.split("\n").map(row => row.split(","));
                
                const encontrado = filas.find(f => f[0].trim().toUpperCase() === idABuscar.trim().toUpperCase());

                if (encontrado) {
                    const datos = {
                        id: encontrado[0],
                        placa: encontrado[2],
                        chofer: encontrado[3],
                        operador: encontrado[7],
                        area: encontrado[8]
                    };
                    mostrarResultado(true, datos);
                } else {
                    mostrarResultado(false, null, idABuscar);
                }
            } catch (error) {
                alert("Error de conexión con Google Sheets");
            }
        };

        function mostrarResultado(autorizado, datos, idEscaneado) {
            const resDiv = document.getElementById('resultadoValidacion');
            resDiv.classList.remove('hidden');
            
            if(autorizado) {
                resDiv.innerHTML = `
                    <div class="bg-green-50 border-2 border-green-600 p-5 rounded-2xl shadow-lg shadow-green-200/50">
                        <p class="text-green-700 font-black text-center text-xl mb-3">✅ AUTORIZADO</p>
                        <div class="space-y-2 bg-white/80 p-4 rounded-xl border border-green-200">
                            <p class="text-xs text-gray-500"><b>ID:</b> ${datos.id}</p>
                            <p class="text-sm uppercase"><b>PLACA:</b> <span class="font-black text-blue-900">${datos.placa}</span></p>
                            <p class="text-sm"><b>CHOFER:</b> ${datos.chofer}</p>
                            <p class="text-sm font-bold text-gray-700">📍 AREA: ${datos.area}</p>
                        </div>
                        <button onclick="confirmarIngreso('${datos.id}', '${datos.placa}', '${datos.area}')" 
                                class="w-full mt-4 bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-md hover:bg-green-700 active:scale-95 transition-all">
                            CONFIRMAR INGRESO 🚛
                        </button>
                    </div>`;
            } else {
                resDiv.innerHTML = `
                    <div class="bg-red-50 border-2 border-red-500 p-5 rounded-2xl text-center shadow-lg shadow-red-200/50">
                        <p class="text-red-700 font-black text-xl">❌ NO AUTORIZADO</p>
                        <p class="text-sm text-red-600 mt-2 font-medium italic underline">ID "${idEscaneado}" no planificado.</p>
                        <button onclick="document.getElementById('resultadoValidacion').classList.add('hidden')" 
                                class="mt-4 bg-red-600 text-white px-6 py-2 rounded-xl font-bold text-[10px] uppercase tracking-widest">Cerrar</button>
                    </div>`;
            }
            resDiv.scrollIntoView({ behavior: 'smooth' });
        }

        window.confirmarIngreso = function(id, placa, area) {
            push(vehiculosRef, {
                codigo: id,
                placa: placa,
                area: area,
                estado: 'Ingreso a Planta',
                fechaIngreso: new Date().toLocaleString(),
                timestamp: Date.now()
            });
            document.getElementById('resultadoValidacion').classList.add('hidden');
            document.getElementById('inputManual').value = '';
            alert("Vehículo " + placa + " registrado.");
        };

        // --- LÓGICA DEL ESCÁNER ---
        window.encenderEscaner = function() {
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                apagarEscaner();
                validarEntrada(text);
            });
        };

        window.apagarEscaner = function() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                });
            }
        };

        // MONITOR
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contenedor = document.getElementById('listaVehiculos');
            contenedor.innerHTML = '';
            if(!data) return;
            Object.keys(data).forEach(key => {
                const v = data[key];
                contenedor.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-600 mb-3 flex justify-between items-center transition-all">
                    <div>
                        <p class="font-black text-blue-900 leading-none text-lg">${v.placa}</p>
                        <p class="text-[10px] text-gray-400 mt-1 font-bold uppercase tracking-wider">${v.area}</p>
                    </div>
                    <button onclick="darSalida('${key}')" class="text-[10px] font-bold text-red-400 border border-red-500/10 px-3 py-2 rounded-lg hover:bg-red-500 hover:text-white transition-all uppercase">Salida</button>
                </div>`;
            });
        });

        window.darSalida = (key) => { if(confirm("¿Confirmar salida?")) remove(ref(db, `vehiculos/${key}`)); };
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-blue-900 text-white p-5 shadow-xl flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-white p-1 rounded-lg text-blue-900 font-black text-sm">AG</div>
            <h1 class="font-black italic tracking-tighter text-xl uppercase">Patio Agripac</h1>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-green-400 rounded-full animate-ping"></div>
            <span class="text-[9px] font-bold uppercase tracking-widest opacity-70">En Línea</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-blue-100">
                <h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-6 text-center italic">Control de Acceso</h2>
                
                <button onclick="encenderEscaner()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-black transition-all shadow-lg active:scale-95">
                    <span class="text-xl">📷</span> ESCANEAR QR
                </button>

                <div class="relative my-8 text-center">
                    <hr class="border-gray-100">
                    <span class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white px-4 text-[10px] font-bold text-gray-300 uppercase">O MANUAL</span>
                </div>

                <div class="space-y-3">
                    <input id="inputManual" type="text" placeholder="Ingresa ID (Ej: C1R-28)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none font-black text-center text-blue-900 uppercase">
                    <button onclick="validarEntrada()" class="w-full bg-blue-100 text-blue-700 py-4 rounded-2xl font-black hover:bg-blue-200 transition-all active:scale-95 uppercase tracking-widest text-xs">
                        Validar ID
                    </button>
                </div>

                <div id="resultadoValidacion" class="hidden mt-8 transition-all"></div>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="flex items-center gap-3 mb-6">
                <h2 class="text-xs font-black text-gray-800 uppercase tracking-[0.2em]">Monitor de Patio</h2>
                <div class="h-[2px] flex-grow bg-gray-100"></div>
            </div>
            <div id="listaVehiculos" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </main>

    <div id="reader-container" class="hidden fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white p-2 rounded-[2rem] overflow-hidden shadow-2xl shadow-blue-500/20">
            <div id="reader"></div>
        </div>
        <button onclick="apagarEscaner()" class="mt-10 bg-white/10 text-white border-2 border-white/20 px-12 py-4 rounded-full font-black tracking-widest text-xs hover:bg-red-600 hover:border-red-600 transition-all">
            CERRAR CÁMARA
        </button>
    </div>
</body>
</html>
