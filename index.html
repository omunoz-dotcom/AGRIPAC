<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGRIPAC - Sistema Modular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANUkQLUGrMh4ET1LdyYCucuZqqVKR39u4",
            authDomain: "agripac-control.firebaseapp.com",
            databaseURL: "https://agripac-control-default-rtdb.firebaseio.com",
            projectId: "agripac-control",
            storageBucket: "agripac-control.firebasestorage.app",
            messagingSenderId: "1033116506620",
            appId: "1:1033116506620:web:d4472bec9f6178b48bba79"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const vehiculosRef = ref(db, 'vehiculos');
        const URL_SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTfWCI46jBJQME3RdDvIbpjYXkdB7x5eSZ7--TigTzfktTllhQ5SdnIcMMfs-8u-E3heuT1eH4Aqi1a/pub?output=csv";

        // --- NAVEGACIÓN ENTRE SECCIONES ---
        window.mostrarSeccion = function(seccionId) {
            document.querySelectorAll('.seccion-app').forEach(s => s.classList.add('hidden'));
            document.getElementById(seccionId).classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            event.currentTarget.classList.add('bg-blue-600', 'text-white');
        };

        // --- LÓGICA GARITA ---
        window.validarGarita = async function(idManual = null) {
            const id = idManual || document.getElementById('inputGarita').value;
            if(!id) return alert("Ingrese ID");
            try {
                const res = await fetch(URL_SHEET_CSV);
                const csv = await res.text();
                const filas = csv.split("\n").map(r => r.split(","));
                const f = filas.find(row => row[0].trim().toUpperCase() === id.trim().toUpperCase());
                if(f) {
                    const vehiculo = {
                        codigo: f[0].trim(), placa: f[2].trim(), chofer: f[3].trim(), area: f[8].trim(),
                        estado: 'PESAJE_ENTRADA', fecha: new Date().toLocaleString(),
                        pEntrada: 0, pSalida: 0, anden: '-', precintos: '-'
                    };
                    push(vehiculosRef, vehiculo);
                    document.getElementById('inputGarita').value = '';
                    alert("✅ AUTORIZADO: Pase a Báscula");
                } else { alert("❌ NO PLANIFICADO"); }
            } catch (e) { alert("Error de conexión"); }
        };

        // --- LÓGICA BÁSCULA ---
        window.registrarPeso = function(id, campo, proximoEstado) {
            const peso = prompt("Ingrese peso en KG:");
            if(!peso) return;
            update(ref(db, `vehiculos/${id}`), { [campo]: peso, estado: proximoEstado });
        };

        // --- LÓGICA DISTRIBUCIÓN ---
        window.gestionarCarga = function(id, accion) {
            if(accion === 'INICIAR') {
                const a = prompt("Asigne Andén:");
                if(!a) return;
                update(ref(db, `vehiculos/${id}`), { anden: a, estado: 'CARGANDO', inicioCarga: Date.now() });
            } else {
                const p = prompt("Ingrese Precintos:");
                if(!p) return;
                update(ref(db, `vehiculos/${id}`), { precintos: p, estado: 'PESAJE_SALIDA' });
            }
        };

        window.darSalidaFinal = (id) => { if(confirm("¿Vehículo fuera de planta?")) remove(ref(db, `vehiculos/${id}`)); };

        // --- MONITOR EN TIEMPO REAL ---
        onValue(vehiculosRef, (snapshot) => {
            const data = snapshot.val();
            const contBascula = document.getElementById('listaBascula');
            const contDist = document.getElementById('listaDist');
            const contGaritaOut = document.getElementById('listaGaritaOut');
            
            contBascula.innerHTML = contDist.innerHTML = contGaritaOut.innerHTML = '';
            if(!data) return;

            Object.keys(data).forEach(id => {
                const v = data[id];
                const cardBase = `
                    <div class="bg-white p-4 rounded-xl shadow mb-3 border-l-4">
                        <div class="flex justify-between">
                            <b>${v.placa}</b> <span class="text-[10px] text-gray-400">ID: ${v.codigo}</span>
                        </div>
                        <p class="text-[10px] text-gray-500 uppercase">${v.area} | Chofer: ${v.chofer}</p>
                `;

                // Clasificación por Secciones
                if(v.estado === 'PESAJE_ENTRADA') {
                    contBascula.innerHTML += cardBase + `
                        <button onclick="registrarPeso('${id}', 'pEntrada', 'ESPERA_ANDEN')" class="w-full mt-2 bg-amber-500 text-white text-[10px] py-2 rounded font-bold uppercase">Registrar Peso Entrada</button>
                    </div>`;
                }
                else if(v.estado === 'ESPERA_ANDEN' || v.estado === 'CARGANDO') {
                    const esCargando = v.estado === 'CARGANDO';
                    const min = esCargando ? Math.floor((Date.now() - v.inicioCarga)/60000) : 0;
                    contDist.innerHTML += cardBase + `
                        <div class="flex gap-2 mt-2">
                            ${!esCargando ? `<button onclick="gestionarCarga('${id}', 'INICIAR')" class="flex-1 bg-blue-600 text-white text-[10px] py-2 rounded font-bold">ASIGNAR ANDÉN</button>` : 
                            `<span class="bg-red-100 text-red-600 p-2 rounded text-[10px] font-bold">${min} MIN</span>
                             <button onclick="gestionarCarga('${id}', 'FINALIZAR')" class="flex-1 bg-green-600 text-white text-[10px] py-2 rounded font-bold uppercase">Cerrar Carga</button>`}
                        </div>
                    </div>`;
                }
                else if(v.estado === 'PESAJE_SALIDA') {
                    contBascula.innerHTML += cardBase + `
                        <button onclick="registrarPeso('${id}', 'pSalida', 'LISTO_SALIDA')" class="w-full mt-2 bg-amber-700 text-white text-[10px] py-2 rounded font-bold uppercase">Registrar Peso Salida</button>
                    </div>`;
                }
                else if(v.estado === 'LISTO_SALIDA') {
                    contGaritaOut.innerHTML += cardBase + `
                        <button onclick="darSalidaFinal('${id}')" class="w-full mt-2 bg-black text-white text-[10px] py-2 rounded font-bold uppercase tracking-widest">Confirmar Salida Física</button>
                    </div>`;
                }
            });
        });

        // Cámara
        window.scan = () => {
            const h = new Html5Qrcode("reader");
            document.getElementById('rc').classList.remove('hidden');
            h.start({facingMode:"environment"}, {fps:10, qrbox:250}, (t)=>{h.stop(); document.getElementById('rc').classList.add('hidden'); validarGarita(t);});
        };
    </script>
</head>
<body class="bg-slate-100">
    <nav class="bg-blue-900 p-2 flex gap-1 sticky top-0 z-50">
        <button onclick="mostrarSeccion('secGarita')" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase rounded-lg bg-blue-600 text-white">Garita (In)</button>
        <button onclick="mostrarSeccion('secBascula')" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase rounded-lg text-blue-200">Báscula</button>
        <button onclick="mostrarSeccion('secDist')" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase rounded-lg text-blue-200">Distribución</button>
        <button onclick="mostrarSeccion('secGaritaOut')" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase rounded-lg text-blue-200">Garita (Out)</button>
    </nav>

    <main class="p-4 max-w-2xl mx-auto">
        <div id="secGarita" class="seccion-app space-y-4">
            <div class="bg-white p-6 rounded-3xl shadow-xl text-center">
                <h2 class="text-xs font-black uppercase text-gray-400 mb-4">Ingreso de Vehículos</h2>
                <button onclick="scan()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black mb-4">📷 ESCANEAR QR</button>
                <input id="inputGarita" type="text" placeholder="ID MANUAL" class="w-full p-4 bg-slate-50 border-2 rounded-2xl mb-2 text-center font-black">
                <button onclick="validarGarita()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs">Validar Planificación</button>
            </div>
        </div>

        <div id="secBascula" class="seccion-app hidden">
            <h2 class="text-xs font-black uppercase text-gray-400 mb-4 tracking-widest">Pendientes de Pesaje</h2>
            <div id="listaBascula"></div>
        </div>

        <div id="secDist" class="seccion-app hidden">
            <h2 class="text-xs font-black uppercase text-gray-400 mb-4 tracking-widest">Andenes y Carga</h2>
            <div id="listaDist"></div>
        </div>

        <div id="secGaritaOut" class="seccion-app hidden">
            <h2 class="text-xs font-black uppercase text-gray-400 mb-4 tracking-widest">Control de Salida</h2>
            <div id="listaGaritaOut"></div>
        </div>
    </main>

    <div id="rc" class="hidden fixed inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center p-6">
        <div id="reader" class="w-full max-w-sm bg-white rounded-3xl overflow-hidden"></div>
        <button onclick="location.reload()" class="mt-8 text-white font-bold bg-red-600 px-10 py-3 rounded-full">CERRAR</button>
    </div>
</body>
</html>
